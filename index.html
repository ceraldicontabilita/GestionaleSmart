async function render_iva(main){
  state.iva = state.iva || {mese: null};
  const annuale = state.iva.mese ? null : await api(`/api/iva/annual/${ANNO}`).catch(()=>null);
  const mensile = state.iva.mese ? await api(`/api/iva/monthly/${ANNO}/${state.iva.mese}`).catch(()=>null) : null;
  const raw = mensile || annuale || {};

  // Backend in annuale ritorna {anno, monthly_data:[{mese, iva_debito, iva_credito, saldo, ...}]}
  // Backend in mensile ritorna {anno, mese, daily_data:[{data, iva_debito, ...}], totali?} e alcuni campi aggregati
  // Normalizza entrambi i casi in un unico oggetto 'data' con iva_debito/iva_credito/saldo aggregati
  let data = {};
  if(annuale && Array.isArray(annuale.monthly_data)){
    data.iva_debito = annuale.monthly_data.reduce((s,m)=>s+Number(m.iva_debito||0),0);
    data.iva_credito = annuale.monthly_data.reduce((s,m)=>s+Number(m.iva_credito||0),0);
    data.imponibile_netto = annuale.monthly_data.reduce((s,m)=>s+Number(m.imponibile_netto||0),0);
    data.saldo = data.iva_debito - data.iva_credito;
    // Ultimo mese con dati → stato progressivo
    const ultimoMese = [...annuale.monthly_data].reverse().find(m=>m.fatture_count||m.corrispettivi_count||m.iva_debito||m.iva_credito);
    if(ultimoMese){
      data.saldo_progressivo = Number(ultimoMese.saldo_progressivo||0);
      data.stato_progressivo = ultimoMese.stato_progressivo;
      data.importo_da_versare = Number(ultimoMese.importo_da_versare||0);
    }
    data.monthly_data = annuale.monthly_data;
  } else if(mensile) {
    // Prova a calcolare aggregati dal daily_data se i totali non sono esposti direttamente
    if(Array.isArray(mensile.daily_data)){
      data.iva_debito = mensile.daily_data.reduce((s,d)=>s+Number(d.iva_debito||0),0);
      data.iva_credito = mensile.daily_data.reduce((s,d)=>s+Number(d.iva_credito||0),0);
      data.imponibile_netto = mensile.daily_data.reduce((s,d)=>s+Number(d.imponibile_netto||0),0);
      data.saldo = data.iva_debito - data.iva_credito;
      // Prendi ultimo giorno con saldo_progressivo
      const ultG = [...mensile.daily_data].reverse().find(d=>d.has_data);
      if(ultG) data.saldo_progressivo = Number(ultG.saldo_progressivo||0);
    }
    // Se invece il backend espone campi al top-level li usa direttamente
    Object.assign(data, {
      iva_debito: data.iva_debito || mensile.iva_debito,
      iva_credito: data.iva_credito || mensile.iva_credito,
      saldo: data.saldo || mensile.saldo,
    });
    data.daily_data = mensile.daily_data;
  }

  main.innerHTML = `
    <div class="month-selector">
      <button class="m ${!state.iva.mese?'active':''}" data-mese="">Anno</button>
      ${getMesi().map(m=>`<button class="m ${state.iva.mese===m.n?'active':''}" data-mese="${m.n}">${m.label}</button>`).join('')}
    </div>
    <div class="stats">
      <div class="stat accent">
        <div class="label">IVA a debito</div>
        <div class="value" style="font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${euro(Number(data.iva_debito||0))}</div>
      </div>
      <div class="stat success">
        <div class="label">IVA a credito</div>
        <div class="value" style="font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${euro(Number(data.iva_credito||0))}</div>
      </div>
    </div>
    <div class="stats one">
      <div class="stat ${Number(data.saldo||0)>=0?'danger':'success'}">
        <div class="label">${state.iva.mese?`${fmtMonth(state.iva.mese)} ${ANNO}`:`Anno ${ANNO}`}</div>
        <div class="value">${euro(Math.abs(Number(data.saldo||0)))}</div>
        <div class="sub">${Number(data.saldo||0)>=0?'a debito':'a credito'}</div>
      </div>
    </div>
    ${data.imponibile_netto ? `
    <div class="card">
      <h3>Imponibile ${state.iva.mese?fmtMonth(state.iva.mese):ANNO}</h3>
      <div class="value" style="font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${euro(Number(data.imponibile_netto))}</div>
    </div>` : ''}
    ${data.monthly_data ? `
    <div class="card">
      <h3>Dettaglio mensile</h3>
      ${data.monthly_data.filter(m=>m.fatture_count||m.corrispettivi_count||m.iva_debito||m.iva_credito).map(m=>`
        <div class="list-item" data-mese-iva="${m.mese}">
          <div class="li-top">
            <div class="li-title">${escapeHtml(m.mese_nome)}<span class="small">${m.fatture_count} fatt · ${m.corrispettivi_count} corr</span></div>
            <div class="li-amount ${Number(m.saldo)>=0?'negative':'positive'}">${euroD(Math.abs(Number(m.saldo||0)))}</div>
          </div>
          <div class="li-bottom">
            <span class="badge ${Number(m.saldo)>=0?'danger':'success'}">${m.stato||(Number(m.saldo)>=0?'Debito':'Credito')}</span>
            <span class="li-meta">D: ${euro(m.iva_debito)} · C: ${euro(m.iva_credito)}</span>
          </div>
        </div>`).join('')}
    </div>` : ''}
  `;
  main.querySelectorAll('.month-selector .m').forEach(b=>{
    b.onclick=()=>{state.iva.mese = b.dataset.mese?parseInt(b.dataset.mese):null; render_iva(main);};
  });
  main.querySelectorAll('.list-item[data-mese-iva]').forEach(el=>{
    el.onclick=()=>{state.iva.mese=parseInt(el.dataset.meseIva); render_iva(main);};
  });
}

function apriIvaSheet(m){
  const mesi = ['','Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
  const label = m.mese ? `${mesi[m.mese]||m.mese} ${m.anno||ANNO}` : (m.trimestre ? `${m.trimestre}° trim. ${m.anno||ANNO}` : String(m.periodo||m.label||'-'));
  const debito = Number(m.iva_debito||m.iva_vendite||m.debito||0);
  const credito = Number(m.iva_credito||m.iva_acquisti||m.credito||0);
  const saldo = Number(m.saldo||m.liquidazione||(debito-credito));
  openSheet(`<h2>€ IVA ${escapeHtml(label)}</h2>
    <div class="kv"><span class="k">IVA vendite (debito)</span><span class="v" style="color:var(--red)">${euroD(debito)}</span></div>
    <div class="kv"><span class="k">IVA acquisti (credito)</span><span class="v" style="color:var(--green)">${euroD(credito)}</span></div>
    <div class="kv" style="border-top:2px solid var(--border);margin-top:4px;padding-top:8px">
      <span class="k" style="font-weight:800">Liquidazione</span>
      <span class="v" style="font-weight:800;font-size:18px;color:${saldo>0?'var(--red)':'var(--green)'}">${saldo>0?'Da versare ':'Credito '}${euro(Math.abs(saldo))}</span>
    </div>
    ${m.base_imponibile_vendite ? `<div class="kv"><span class="k">Imponibile vendite</span><span class="v">${euroD(m.base_imponibile_vendite)}</span></div>` : ''}
    ${m.base_imponibile_acquisti ? `<div class="kv"><span class="k">Imponibile acquisti</span><span class="v">${euroD(m.base_imponibile_acquisti)}</span></div>` : ''}

}

async function render_calendario_fiscale(main){
  const [cal, notif] = await Promise.all([
    api(`/api/fiscalita/calendario/${ANNO}`).catch(()=>null),
    Promise.resolve(null), // notifiche-scadenze endpoint ha bug backend (500)
  ]);
  const scad = (cal?.scadenze || cal?.items || cal || []);
  const list = Array.isArray(scad)?scad:[];
  const notifiche = Array.isArray(notif)?notif:(notif?.items||[]);
  const prossime = list.filter(s=>!s.completata && s.data_scadenza && new Date(s.data_scadenza)>=new Date());
  const scadute = list.filter(s=>!s.completata && s.data_scadenza && new Date(s.data_scadenza)<new Date());
  main.innerHTML = `
    <div class="stats three">
      <div class="stat accent"><div class="label">Prossime</div><div class="value">${prossime.length}</div></div>
      <div class="stat danger"><div class="label">Scadute</div><div class="value">${scadute.length}</div></div>
      <div class="stat success"><div class="label">Fatte</div><div class="value">${list.length-prossime.length-scadute.length}</div></div>
    </div>
    ${notifiche.length?`<div class="section-title">⚠️ Notifiche (30gg)</div>
    ${notifiche.slice(0,5).map(n=>`<div class="alert-row ${n.urgenza==='alta'?'danger':''}">
      <div class="a-icon">📅</div>
      <div class="a-body">
        <div class="a-title">${escapeHtml(n.titolo||n.descrizione||'-')}</div>
        <div class="a-sub">${fmtDate(n.data_scadenza)} · ${euro(n.importo||0)}</div>
      </div>
    </div>`).join('')}`:''}
    <div class="section-title">Calendario ${ANNO}</div>
    ${list.length?list.sort((a,b)=>new Date(a.data_scadenza)-new Date(b.data_scadenza)).slice(0,60).map(s=>{
      const gg = s.data_scadenza?Math.floor((new Date(s.data_scadenza)-new Date())/86400000):null;
      const badge = s.completata?'<span class="badge success">✓ Fatto</span>':(gg!==null&&gg<0?`<span class="badge danger">Scad. ${Math.abs(gg)}gg fa</span>`:(gg!==null?`<span class="badge warning">Tra ${gg}gg</span>`:'<span class="badge neutral">-</span>'));
      return `<div class="list-item">
        <div class="li-top">
          <div class="li-title">${escapeHtml(s.titolo||s.descrizione||s.tipo||'-')}<span class="small">${escapeHtml(s.categoria||s.tipo||'')} · ${fmtDate(s.data_scadenza)}</span></div>
          ${s.importo?`<div class="li-amount">${euroD(s.importo)}</div>`:''}
        </div>
        <div class="li-bottom">${badge}
          ${!s.completata&&s.id?`<button class="btn btn-sm btn-success" onclick="completaScadFiscale('${s.id}')">✓ Fatto</button>`:''}
        </div>
      </div>`;
    }).join(''):'<div class="empty"><div class="icon">🗓️</div><div class="title">Nessuna scadenza fiscale</div></div>'}
  `;
}

async function render_dipendenti(main){
  state.dip = state.dip || {srch:''};
  main.innerHTML = `
    <div class="search-bar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>

  `;
  const data = await api('/api/dipendenti?limit=500');
  const list = Array.isArray(data)?data:(data.items||data.dipendenti||[]);
  const att = list.filter(d=>d.stato==='attivo'||d.is_active||(!d.data_cessazione&&!d.cessato));
  const ces = list.length - att.length;
  const render = ()=>{
    const q = ($('srchD').value||'').toLowerCase().trim();

        <div class="stat success"><div class="label">Attivi</div><div class="value">${att.length}</div></div>

      </div>
      <div class="section-title">Elenco (${filt.length})</div>
      ${filt.length ? filt.map(d=>{
        const nome = `${d.cognome||''} ${d.nome||''}`.trim() || d.nome_completo || '-';
        const attivo = d.stato==='attivo'||d.is_active||(!d.data_cessazione&&!d.cessato);
        return `<div class="list-item" data-dip='${encodeURIComponent(JSON.stringify(d))}'>
          <div class="li-top">
            <div class="li-title">${escapeHtml(nome)}<span class="small">${escapeHtml(d.mansione||d.ruolo||'-')}</span></div>

      el.onclick = ()=>openDipendenteSheet(JSON.parse(decodeURIComponent(el.dataset.dip)));

async function salvaDipendente(id){
  const nome = $('dNome').value.trim();
  const cognome = $('dCogn').value.trim();
  if(!nome || !cognome) return toast('Nome e cognome obbligatori','error');
  const body = {
    nome, cognome,
    codice_fiscale: $('dCF').value.trim().toUpperCase(),
    email: $('dEmail').value.trim(),
    telefono: $('dTel').value.trim(),
    mansione: $('dMans').value.trim(),
    qualifica: $('dMans').value.trim(),
    data_assunzione: $('dDataAss').value,
    tipo_contratto: $('dContr').value,
    iban: $('dIban').value.trim().replace(/\s/g,''),
    in_carico: true, attivo: true,
  };
  try{
    if(id) await api(`/api/dipendenti/${id}`,{method:'PUT',body:JSON.stringify(body)});
    else    await api('/api/dipendenti',{method:'POST',body:JSON.stringify(body)});
    toast('Salvato','success');haptic(30);closeSheet();reloadModule();
  }catch(e){toast('Errore: '+e.message,'error');}
}
async function eliminaDipendente(id){
  if(!confirm('Eliminare questo dipendente? L\'operazione è irreversibile.')) return;
  try{

      <div class="stat warning"><div class="label">Non associati</div><div class="value">${stats?.non_associati||0}</div></div>
    </div>
    <div class="section-title">Documenti recenti (${docs.length})</div>
    <div>${docs.length?docs.slice(0,50).map(d=>{
      const name = d.filename||d.nome||d.titolo||'Documento';
      const tipo = d.tipo||d.classificazione||d.categoria||'da classificare';
      const stato = d.stato||d.status||'';
      const bClass = stato==='elaborato'?'success':(stato==='non_associato'||stato==='da_verificare'?'warning':'neutral');
      return `<div class="list-item" onclick="apriDocumentoSheet(JSON.parse(decodeURIComponent(this.dataset.d)))" data-d='${encodeURIComponent(JSON.stringify(d))}'>
        <div class="li-top">
          <div class="li-title">${escapeHtml(name)}<span class="small">${escapeHtml(tipo)} · ${fmtDate(d.data||d.data_acquisizione||d.created_at)}</span></div>
        </div>
        <div class="li-bottom"><span class="badge ${bClass}">${escapeHtml(stato||'-')}</span><span class="li-meta">${escapeHtml(d.origine||d.source||'')}</span></div>
      </div>`;
    }).join(''):'<div class="empty"><div class="icon">📂</div><div class="title">Inbox vuota</div></div>'}</div>
  `;
}

function apriDocumentoSheet(d){
  window._lastDoc = d;
  const stato = d.stato||d.status||'';
  const bClass = stato==='elaborato'?'success':(stato==='non_associato'||stato==='da_verificare'?'warning':'neutral');
  openSheet(`<h2>📂 ${escapeHtml(d.filename||d.nome||'Documento')}</h2>
    <div class="kv"><span class="k">Tipo</span><span class="v">${escapeHtml(d.tipo||d.classificazione||d.categoria||'-')}</span></div>
    <div class="kv"><span class="k">Stato</span><span class="v"><span class="badge ${bClass}">${escapeHtml(stato||'-')}</span></span></div>
    <div class="kv"><span class="k">Data</span><span class="v">${fmtDate(d.data||d.data_acquisizione||d.created_at)}</span></div>
    <div class="kv"><span class="k">Origine</span><span class="v">${escapeHtml(d.origine||d.source||'-')}</span></div>
    ${d.size ? `<div class="kv"><span class="k">Dimensione</span><span class="v">${Math.round((d.size||0)/1024)} KB</span></div>` : ''}
    <div style="margin-top:16px;display:grid;gap:8px">
      <button class="btn btn-primary btn-block" onclick="processaDocumento('${d.id||d._id||d.doc_id}')">⚡ Processa</button>
      <button class="btn btn-ghost btn-block" onclick="apriFormCategoriaDoc('${d.id||d._id||d.doc_id}','${escapeHtml(d.tipo||'')}')">🏷 Cambia categoria</button>
      <button class="btn btn-danger btn-block" onclick="eliminaDocumento('${d.id||d._id||d.doc_id}')">🗑 Elimina</button>
      <button class="btn btn-ghost btn-block" onclick="closeSheet()">Chiudi</button>
    </div>`);
}
async function processaDocumento(id){
  try{
    await api(`/api/documenti/documento/${id}/processa`,{method:'POST'});
    toast('Documento in elaborazione','success');closeSheet();reloadModule();
  }catch(e){toast('Errore: '+e.message,'error');}
}
function apriFormCategoriaDoc(id, catAttuale){
  const categorie = ['fattura','corrispettivo','estratto_conto','f24','busta_paga','contratto','altro'];
  openSheet(`<h2>🏷 Cambia categoria</h2>
    <div class="field"><label>Categoria</label><select id="docCat" class="select">
      ${categorie.map(c=>`<option value="${c}" ${c===catAttuale?'selected':''}>${c}</option>`).join('')}
    </select></div>
    <button class="btn btn-primary btn-block" onclick="salvaCategoriaDoc('${id}')">💾 Salva</button>
    <button class="btn btn-ghost btn-block" style="margin-top:8px" onclick="closeSheet()">Annulla</button>`);
}
async function salvaCategoriaDoc(id){
  try{
    await api(`/api/documenti/documento/${id}/cambia-categoria`,{method:'POST',body:JSON.stringify({categoria:$('docCat').value})});
    toast('Categoria aggiornata','success');closeSheet();reloadModule();
  }catch(e){toast('Errore: '+e.message,'error');}
}
async function eliminaDocumento(id){
  if(!confirm('Eliminare questo documento?')) return;
  try{
    await api(`/api/documenti/documento/${id}`,{method:'DELETE'});
    toast('Documento eliminato','success');closeSheet();reloadModule();
  }catch(e){toast('Errore: '+e.message,'error');}
}

function apriFormUploadDocumento(){
  openSheet(`<h2>📤 Carica documento</h2>
    <p class="muted" style="margin:0 0 14px;font-size:12px">Carica fattura, F24, estratto conto o qualsiasi documento da processare automaticamente.</p>
    <div class="field"><label>File (PDF, XML, immagine)</label>
      <input type="file" id="docFile" class="input" accept=".pdf,.xml,.jpg,.jpeg,.png,.tiff">
    </div>
    <div class="field"><label>Categoria</label>
      <select id="docCatUp" class="select">
        <option value="">-- auto-detect --</option>
        <option value="fattura">Fattura</option>
        <option value="f24">F24</option>
        <option value="estratto_conto">Estratto conto</option>
        <option value="busta_paga">Busta paga</option>
        <option value="contratto">Contratto</option>
        <option value="altro">Altro</option>
      </select>
    </div>
    <div id="docUploadProgress" style="display:none" class="loading"><span class="spinner"></span>Caricamento...</div>
    <button class="btn btn-primary btn-block" onclick="caricaDocumento()">📤 Carica</button>
    <button class="btn btn-ghost btn-block" style="margin-top:8px" onclick="closeSheet()">Annulla</button>`);
}
async function caricaDocumento(){
  const fileInput = document.getElementById('docFile');
  if(!fileInput || !fileInput.files[0]) return toast('Seleziona un file','error');
  const file = fileInput.files[0];
  const cat = document.getElementById('docCatUp')?.value || '';
  
  // Mostra progress
  const prog = document.getElementById('docUploadProgress');
  if(prog) prog.style.display = 'block';
  
  try{
    const formData = new FormData();
    formData.append('file', file);
    if(cat) formData.append('categoria', cat);
    
    const url = API_BASE.replace(/\/$/, '') + '/api/documenti/upload-auto';
    const res = await fetch(url, {
      method: 'POST',
      headers: TOKEN ? {'Authorization': 'Bearer '+TOKEN} : {},
      body: formData,
    });
    if(!res.ok){
      const err = await res.text();
      throw new Error(`HTTP ${res.status}: ${err.slice(0,100)}`);
    }
    const data = await res.json();
    toast('Documento caricato e in elaborazione','success');haptic(30);closeSheet();reloadModule();
  }catch(e){
    if(prog) prog.style.display = 'none';
    toast('Errore caricamento: '+e.message,'error');
  }
  $('fab').classList.remove('hidden');
  $('fab').onclick = apriFormUploadDocumento;
}
</script><script>
async function render_riconciliazione(main){
  const [mov, fat, stats] = await Promise.all([
    api(`/api/estratto-conto-movimenti/movimenti?riconciliato=false&limit=100&anno=${ANNO}`).catch(()=>[]),
    api(`/api/invoices?anno=${ANNO}&limit=500`).catch(()=>[]),
    api(`/api/riconciliazione-auto/stats-riconciliazione?anno=${ANNO}`).catch(()=>null),
  ]);
  const lMov = Array.isArray(mov)?mov:(mov.items||[]);
  const lFatAll = Array.isArray(fat)?fat:(fat.items||fat.invoices||[]);
  // Filtra non pagate client-side (endpoint /api/invoices/list ritorna sempre vuoto in produzione)
  const lFat = lFatAll.filter(f => !isPagataF(f));
  main.innerHTML = `
    <div class="stats">
      <div class="stat warning"><div class="label">Movimenti aperti</div><div class="value">${lMov.length}</div><div class="sub">da riconciliare</div></div>
      <div class="stat accent"><div class="label">Fatture aperte</div><div class="value">${lFat.length}</div></div>
    </div>
    ${stats?`<div class="card"><h3>📊 Stato riconciliazione</h3>
      <div class="kv"><span class="k">Riconciliate</span><span class="v" style="color:var(--success);font-weight:800">${stats.riconciliate||0}</span></div>
      <div class="kv"><span class="k">Match automatici</span><span class="v">${stats.auto_match||0}</span></div>
      <div class="kv"><span class="k">Da verificare</span><span class="v" style="color:var(--warning);font-weight:800">${stats.da_verificare||0}</span></div>
    </div>`:''}
    <button class="btn btn-primary btn-block" onclick="avviaRiconciliazione()">▶️ Avvia riconciliazione automatica</button>
    ${lMov.length?`<div class="section-title">Movimenti da riconciliare (${lMov.length})</div>
    <div>${lMov.slice(0,20).map(m=>{
      const imp=Number(m.importo||0);const pos=imp>=0;
      return `<div class="list-item" onclick="apriMovimentoRicSheet(JSON.parse(decodeURIComponent(this.dataset.ric)))" data-ric='${encodeURIComponent(JSON.stringify(m))}'>
        <div class="li-top">
          <div class="li-title">${escapeHtml(m.descrizione||m.description||'-')}<span class="small">${fmtDate(m.data)}</span></div>
          <div class="li-amount ${pos?'positive':'negative'}">${pos?'+':''}${euroD(imp)}</div>
        </div>
      </div>`;
    }).join('')}</div>`:''}
  `;
}
async function avviaRiconciliazione(){
  if(!confirm('Avviare riconciliazione automatica?'))return;
  try{await api('/api/riconciliazione-auto/riconcilia-estratto-conto',{method:'POST',body:JSON.stringify({anno:ANNO})});toast('Riconciliazione avviata','success');setTimeout(reloadModule,1500);}
  catch(e){toast('Errore: '+e.message,'error');}
}

function apriMovimentoRicSheet(m){
  const imp = Number(m.importo||0);
  openSheet(`<h2>🔗 Movimento da riconciliare</h2>
    <div class="kv"><span class="k">Descrizione</span><span class="v">${escapeHtml(m.descrizione||m.description||'-')}</span></div>
    <div class="kv"><span class="k">Data</span><span class="v">${fmtDate(m.data)}</span></div>
    <div class="kv"><span class="k">Importo</span><span class="v" style="font-weight:800;color:${imp>=0?'var(--green)':'var(--red)'}">${imp>=0?'+':''}${euro(imp)}</span></div>
    ${m.banca||m.conto ? `<div class="kv"><span class="k">Conto</span><span class="v">${escapeHtml(m.banca||m.conto||'-')}</span></div>` : ''}
    <div style="margin-top:16px"><button class="btn btn-ghost btn-block" onclick="closeSheet()">Chiudi</button></div>`);
}
</script>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0B0E1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Ceraldi — Gestionale</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════
   CERALDI GESTIONALE — DESIGN SYSTEM v7
   Palette: Midnight Ink + Electric Indigo + Pure White
   Font: DM Sans (body) + DM Mono (numbers)
   Motif: Precision, depth, asymmetric accents
═══════════════════════════════════════════════════ */
:root{
  /* Core palette */
  --ink:#0B0E1A;
  --ink-2:#1A1F35;
  --ink-3:#252B45;
  --surface:#FFFFFF;
  --surface-2:#F4F6FB;
  --surface-3:#EDF0F7;
  --border:#E3E7F0;
  --border-2:#D0D6E8;

  /* Brand */
  --indigo:#4F46E5;
  --indigo-2:#6366F1;
  --indigo-soft:#EEEFFE;
  --indigo-glow:rgba(79,70,229,.18);

  /* Semantic */
  --green:#059669;
  --green-soft:#D1FAE5;
  --red:#DC2626;
  --red-soft:#FEE2E2;
  --amber:#D97706;
  --amber-soft:#FEF3C7;
  --sky:#0284C7;
  --sky-soft:#E0F2FE;

  /* Typography */
  --text:#0B0E1A;
  --text-2:#5B6480;
  --text-3:#8892AA;

  /* Radii */
  --r-sm:8px;
  --r-md:12px;
  --r-lg:16px;
  --r-xl:20px;
  --r-full:999px;

  /* Shadows */
  --sh-sm:0 1px 3px rgba(11,14,26,.08),0 1px 2px rgba(11,14,26,.06);
  --sh-md:0 4px 16px rgba(11,14,26,.08),0 2px 6px rgba(11,14,26,.05);
  --sh-lg:0 12px 40px rgba(11,14,26,.12),0 4px 12px rgba(11,14,26,.07);
  --sh-indigo:0 6px 20px rgba(79,70,229,.28);

  /* Safe areas */
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}

/* ── Reset ── */
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;overscroll-behavior-y:none}
body{
  font-family:'DM Sans',-apple-system,system-ui,sans-serif;
  font-size:15px;
  color:var(--text);
  background:var(--surface-2);
  -webkit-font-smoothing:antialiased;
  text-size-adjust:100%;
  -webkit-text-size-adjust:100%;
}
button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}

/* ── App shell ── */
.app{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh}

/* ── Topbar ── */
.topbar{
  position:sticky;top:0;z-index:40;
  background:var(--ink);
  color:#fff;
  padding:calc(10px + var(--safe-top)) 14px 10px;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid rgba(255,255,255,.06);
}
/* subtle gradient shimmer on topbar */
.topbar::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(79,70,229,.15) 0%,transparent 60%);
  pointer-events:none;
}
.topbar .menu-btn,.icon-btn{
  position:relative;
  width:40px;height:40px;border-radius:var(--r-md);
  border:none;background:rgba(255,255,255,.08);color:#fff;
  display:grid;place-items:center;cursor:pointer;
  transition:background .15s,transform .1s;flex-shrink:0;
}
.topbar .menu-btn:active,.icon-btn:active{background:rgba(255,255,255,.15);transform:scale(.93)}
.topbar .title-wrap{flex:1;min-width:0;position:relative}
.topbar .title{font-weight:700;font-size:16px;letter-spacing:-.025em;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar .title-sub{font-weight:400;opacity:.5;font-size:11px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'DM Mono',monospace;letter-spacing:.02em}
.topbar .actions{display:flex;gap:4px;flex-shrink:0;position:relative}

/* ── Main content ── */
main{flex:1;padding:16px 14px calc(28px + var(--safe-bot));max-width:680px;margin:0 auto;width:100%;overflow-x:hidden}

/* ── Drawer overlay ── */
.drawer-overlay{position:fixed;inset:0;background:rgba(11,14,26,.6);z-index:90;opacity:0;pointer-events:none;transition:opacity .22s;backdrop-filter:blur(2px)}
.drawer-overlay.show{opacity:1;pointer-events:auto}

/* ── Drawer ── */
.drawer{
  position:fixed;top:0;left:0;bottom:0;
  width:82%;max-width:320px;
  background:var(--ink);
  color:#fff;z-index:91;
  transform:translateX(-100%);
  transition:transform .28s cubic-bezier(.32,0,.04,1);
  display:flex;flex-direction:column;
  padding:calc(20px + var(--safe-top)) 0 calc(16px + var(--safe-bot));
  border-right:1px solid rgba(255,255,255,.06);
}
.drawer.show{transform:translateX(0)}

.drawer-head{
  padding:0 18px 18px;
  border-bottom:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;gap:12px;
}
.drawer-head .logo{
  width:40px;height:40px;border-radius:var(--r-md);
  background:var(--indigo);
  display:grid;place-items:center;
  font-weight:800;font-size:17px;letter-spacing:-.03em;
  box-shadow:0 4px 12px rgba(79,70,229,.4);
  flex-shrink:0;
}
.drawer-head h2{font-size:15px;font-weight:700;line-height:1.1}
.drawer-head .sub{opacity:.45;font-size:10px;margin-top:3px;font-family:'DM Mono',monospace;letter-spacing:.04em}

.drawer-nav{flex:1;overflow-y:auto;padding:10px 8px;scrollbar-width:none}
.drawer-nav::-webkit-scrollbar{display:none}

.drawer-section{
  padding:14px 12px 5px;
  font-size:9px;text-transform:uppercase;letter-spacing:.14em;
  color:rgba(255,255,255,.3);font-weight:700;margin-top:4px;
}
.drawer-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 13px;border-radius:var(--r-md);
  color:rgba(255,255,255,.6);font-weight:500;font-size:14px;
  cursor:pointer;border:none;background:none;width:100%;text-align:left;
  margin-bottom:1px;transition:background .12s,color .12s;min-height:44px;
}
.drawer-item:active{background:rgba(255,255,255,.06)}
.drawer-item.active{background:rgba(79,70,229,.25);color:#fff;font-weight:600}
.drawer-item.active .di-icon{color:var(--indigo-2)}
.drawer-item .di-icon{
  font-size:18px;flex-shrink:0;width:24px;text-align:center;
  transition:transform .15s;
}
.drawer-item:active .di-icon{transform:scale(.9)}
.drawer-item .di-label{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.drawer-foot{
  padding:12px 18px;
  border-top:1px solid rgba(255,255,255,.06);
  font-size:10px;color:rgba(255,255,255,.28);
  font-family:'DM Mono',monospace;letter-spacing:.04em;
}

/* ── Cards ── */
.card{
  background:var(--surface);
  border-radius:var(--r-xl);
  padding:16px;
  box-shadow:var(--sh-sm);
  margin-bottom:12px;
  border:1px solid var(--border);
}
.card h3{font-size:14px;font-weight:700;margin-bottom:10px;letter-spacing:-.015em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── Stats grid ── */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stats.three{grid-template-columns:repeat(3,minmax(0,1fr))}
.stats.three .stat{padding:10px 8px}
.stats.one{grid-template-columns:1fr}
.stat{
  background:var(--surface);
  border-radius:var(--r-lg);
  padding:14px;
  box-shadow:var(--sh-sm);
  border:1px solid var(--border);
  min-width:0;overflow:hidden;
}
.stat .label{
  font-size:9px;color:var(--text-3);font-weight:700;
  text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;
}
.stat .value{
  font-size:22px;font-weight:800;letter-spacing:-.04em;line-height:1;
  font-family:'DM Mono',monospace;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  max-width:100%;display:block;
}
.stat .sub{font-size:11px;color:var(--text-2);margin-top:5px;font-weight:500}

/* Colored stat variants */
.stat.ink{background:var(--ink);border-color:transparent;color:#fff}
.stat.ink .label{color:rgba(255,255,255,.5)}
.stat.ink .sub{color:rgba(255,255,255,.5)}
.stat.ink .value::before{content:'';display:block;position:absolute}

.stat.indigo{background:linear-gradient(135deg,var(--indigo) 0%,var(--indigo-2) 100%);border:none;color:#fff;box-shadow:var(--sh-indigo)}
.stat.indigo .label,.stat.indigo .sub{color:rgba(255,255,255,.7)}

.stat.green{background:linear-gradient(135deg,#059669 0%,#10b981 100%);border:none;color:#fff}
.stat.green .label,.stat.green .sub{color:rgba(255,255,255,.7)}

.stat.red{background:linear-gradient(135deg,#dc2626 0%,#ef4444 100%);border:none;color:#fff}
.stat.red .label,.stat.red .sub{color:rgba(255,255,255,.7)}

.stat.amber{background:linear-gradient(135deg,#d97706 0%,#f59e0b 100%);border:none;color:#fff}
.stat.amber .label,.stat.amber .sub{color:rgba(255,255,255,.7)}

/* Legacy class support */
.stat.accent{background:linear-gradient(135deg,var(--indigo) 0%,var(--indigo-2) 100%);border:none;color:#fff;box-shadow:var(--sh-indigo)}
.stat.accent .label,.stat.accent .sub{color:rgba(255,255,255,.7)}
.stat.success{background:linear-gradient(135deg,#059669 0%,#10b981 100%);border:none;color:#fff}
.stat.success .label,.stat.success .sub{color:rgba(255,255,255,.7)}
/* Valori monetari: font scalabile per evitare overflow */
.stat .value{font-size:clamp(13px,4vw,22px);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;max-width:100%}
.stat.danger{background:linear-gradient(135deg,#dc2626 0%,#ef4444 100%);border:none;color:#fff}
.stat.danger .label,.stat.danger .sub{color:rgba(255,255,255,.7)}
.stat.warning{background:linear-gradient(135deg,#d97706 0%,#f59e0b 100%);border:none;color:#fff}
.stat.warning .label,.stat.warning .sub{color:rgba(255,255,255,.7)}

/* ── Badges ── */
.badge{
  display:inline-flex;align-items:center;
  padding:3px 9px;border-radius:var(--r-full);
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
  white-space:nowrap;
}
.badge.success{background:var(--green-soft);color:#065f46}
.badge.warning{background:var(--amber-soft);color:#92400e}
.badge.danger{background:var(--red-soft);color:#991b1b}
.badge.info{background:var(--sky-soft);color:#075985}
.badge.neutral{background:var(--surface-3);color:var(--text-2)}
.badge.primary{background:var(--indigo-soft);color:var(--indigo)}

/* ── List items ── */
.list-item{
  background:var(--surface);
  border-radius:var(--r-lg);
  padding:14px;
  margin-bottom:8px;
  cursor:pointer;
  box-shadow:var(--sh-sm);
  border:1px solid var(--border);
  transition:border-color .12s,box-shadow .12s,transform .1s;
}
.list-item:active{transform:scale(.99);border-color:var(--indigo-2);box-shadow:0 0 0 3px var(--indigo-glow)}
.list-item .li-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:4px}
.list-item .li-title{font-weight:600;font-size:14px;line-height:1.35;flex:1;min-width:0;overflow:hidden;letter-spacing:-.01em}
.list-item .li-title .small{
  font-weight:400;color:var(--text-2);font-size:12px;
  display:block;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.list-item .li-amount{
  font-weight:800;font-size:15px;white-space:nowrap;
  letter-spacing:-.03em;font-family:'DM Mono',monospace;
  flex-shrink:0;max-width:45%;overflow:hidden;text-overflow:ellipsis;
}
.list-item .li-amount.positive{color:var(--green)}
.list-item .li-amount.negative{color:var(--red)}
.list-item .li-bottom{
  display:flex;justify-content:space-between;align-items:center;
  gap:8px;margin-top:8px;flex-wrap:wrap;
}
.list-item .li-meta{font-size:11px;color:var(--text-3);font-family:'DM Mono',monospace}

/* ── Buttons ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;
  gap:6px;padding:11px 16px;
  border-radius:var(--r-md);border:none;
  font-weight:700;font-size:13px;letter-spacing:-.01em;
  cursor:pointer;transition:transform .1s,opacity .15s,box-shadow .15s;
}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{
  background:var(--indigo);color:#fff;
  box-shadow:var(--sh-indigo);
}
.btn-primary:hover{background:var(--indigo-2)}
.btn-ghost{background:var(--surface-3);color:var(--text);border:1px solid var(--border)}
.btn-success{background:var(--green);color:#fff}
.btn-warning{background:var(--amber);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-block{width:100%}
.btn-sm{padding:7px 12px;font-size:12px}

/* ── FAB ── */
.fab{
  position:fixed;bottom:calc(22px + var(--safe-bot));right:16px;
  width:54px;height:54px;border-radius:50%;
  background:var(--indigo);color:#fff;border:none;
  box-shadow:var(--sh-indigo);
  display:grid;place-items:center;cursor:pointer;z-index:30;
  transition:transform .1s;
}
.fab:active{transform:scale(.9)}

/* ── Form fields ── */
.field{margin-bottom:12px}
.field label{
  display:block;font-size:10px;font-weight:700;
  color:var(--text-3);margin-bottom:5px;
  text-transform:uppercase;letter-spacing:.08em;
}
.input,.select,.textarea{
  width:100%;padding:11px 13px;
  border:1.5px solid var(--border);border-radius:var(--r-md);
  background:var(--surface);font-size:14px;outline:none;
  transition:border-color .15s,box-shadow .15s;
}
.textarea{resize:vertical;min-height:80px}
.input:focus,.select:focus,.textarea:focus{
  border-color:var(--indigo);
  box-shadow:0 0 0 3px var(--indigo-glow);
}
.field-row{display:flex;gap:10px}
.field-row .field{flex:1}

/* ── Search bar ── */
.search-bar{
  display:flex;align-items:center;gap:8px;
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--r-lg);padding:10px 13px;
  margin-bottom:10px;box-shadow:var(--sh-sm);
  transition:border-color .15s;
}
.search-bar:focus-within{border-color:var(--indigo);box-shadow:0 0 0 3px var(--indigo-glow)}
.search-bar input{flex:1;border:none;outline:none;font-size:14px;background:none}
.search-bar svg{color:var(--text-3);flex-shrink:0}

/* ── Chips / filters ── */
.chips{
  display:flex;gap:7px;overflow-x:auto;
  padding:2px 14px 12px;scrollbar-width:none;margin:0 -14px;
}
.chips::-webkit-scrollbar{display:none}
.chip{
  padding:9px 16px;border-radius:var(--r-full);
  background:var(--surface);border:1.5px solid var(--border);
  font-size:13px;font-weight:600;cursor:pointer;
  white-space:nowrap;flex-shrink:0;color:var(--text-2);
  transition:all .12s;min-height:38px;display:inline-flex;align-items:center;
  box-shadow:var(--sh-sm);
}
.chip.active{background:var(--indigo);border-color:transparent;color:#fff;box-shadow:0 3px 10px rgba(79,70,229,.3)}

/* ── Bottom sheet ── */
.sheet-overlay{
  position:fixed;inset:0;background:rgba(11,14,26,.55);z-index:100;
  opacity:0;pointer-events:none;transition:opacity .22s;
  display:flex;align-items:flex-end;backdrop-filter:blur(2px);
}
.sheet-overlay.show{opacity:1;pointer-events:auto}
.sheet{
  background:var(--surface);width:100%;max-width:680px;
  margin:0 auto;border-radius:var(--r-xl) var(--r-xl) 0 0;
  padding:8px 16px calc(20px + var(--safe-bot));
  max-height:92vh;overflow-y:auto;
  transform:translateY(100%);
  transition:transform .28s cubic-bezier(.32,0,.04,1);
  box-shadow:0 -4px 40px rgba(11,14,26,.2);
}
.sheet-overlay.show .sheet{transform:translateY(0)}
.sheet-handle{
  width:36px;height:4px;background:var(--border-2);
  border-radius:var(--r-full);margin:4px auto 14px;
}
.sheet h2{margin:0 0 16px;font-size:18px;font-weight:800;letter-spacing:-.03em}
.sheet .kv{
  display:flex;justify-content:space-between;gap:10px;
  padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;
}
.sheet .kv:last-of-type{border:none}
.sheet .kv .k{color:var(--text-3);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding-top:1px}
.sheet .kv .v{font-weight:700;text-align:right;word-break:break-all;font-family:'DM Mono',monospace;max-width:65%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── PIN screen ── */
.pin-wrap{
  position:fixed;inset:0;z-index:300;
  background:var(--ink);
  color:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:calc(24px + var(--safe-top)) 24px calc(24px + var(--safe-bot));
  gap:28px;overflow-y:auto;
}
/* Ambient glow behind PIN screen */
.pin-wrap::before{
  content:'';position:fixed;
  top:-30%;left:-20%;width:80%;height:80%;
  background:radial-gradient(ellipse at center,rgba(79,70,229,.22) 0%,transparent 70%);
  pointer-events:none;
}
.pin-wrap::after{
  content:'';position:fixed;
  bottom:-20%;right:-20%;width:70%;height:70%;
  background:radial-gradient(ellipse at center,rgba(99,102,241,.15) 0%,transparent 70%);
  pointer-events:none;
}
.pin-head{display:flex;flex-direction:column;align-items:center;gap:14px;position:relative;z-index:1}
.pin-head .logo{
  width:72px;height:72px;border-radius:20px;
  background:var(--indigo);
  display:grid;place-items:center;
  color:#fff;font-weight:800;font-size:30px;letter-spacing:-.04em;
  box-shadow:0 12px 36px rgba(79,70,229,.45);
}
.pin-head h1{
  margin:0;font-size:22px;font-weight:800;letter-spacing:-.04em;text-align:center;
  line-height:1.15;
}
.pin-head .pin-sub{opacity:.45;font-size:13px;text-align:center;letter-spacing:.01em}
.pin-center{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;position:relative;z-index:1}
.pin-dots{display:flex;gap:14px;margin:8px 0 6px}
.pin-dot{
  width:14px;height:14px;border-radius:50%;
  border:2px solid rgba(255,255,255,.3);
  transition:all .15s cubic-bezier(.34,1.56,.64,1);
}
.pin-dot.filled{background:#fff;border-color:#fff;transform:scale(1.2);box-shadow:0 0 12px rgba(255,255,255,.4)}
.pin-dot.err{background:var(--red);border-color:var(--red);box-shadow:0 0 12px rgba(220,38,38,.5)}
.pin-shake{animation:shake .4s cubic-bezier(.36,.07,.19,.97)}
@keyframes shake{0%,100%{transform:translateX(0)}15%{transform:translateX(-9px)}30%{transform:translateX(8px)}45%{transform:translateX(-7px)}60%{transform:translateX(6px)}75%{transform:translateX(-4px)}90%{transform:translateX(3px)}}
.pin-msg{min-height:22px;font-size:13px;font-weight:600;opacity:.8;text-align:center;padding:0 10px}
.pin-msg.err{color:#FCA5A5}
.pin-msg.ok{color:#6EE7B7}
.pin-pad{
  display:grid;grid-template-columns:repeat(3,1fr);gap:14px;
  max-width:290px;width:100%;padding:0 2px;
  position:relative;z-index:1;
}
.pin-key{
  width:100%;aspect-ratio:1;max-width:78px;max-height:78px;
  border-radius:50%;
  background:rgba(255,255,255,.09);
  backdrop-filter:blur(4px);
  border:1px solid rgba(255,255,255,.1);
  color:#fff;font-size:26px;font-weight:400;
  cursor:pointer;display:grid;place-items:center;
  justify-self:center;transition:all .1s;
  font-family:'DM Sans',sans-serif;
  letter-spacing:-.01em;
}
.pin-key:active{background:rgba(255,255,255,.22);transform:scale(.93);border-color:rgba(255,255,255,.25)}
.pin-key.ghost{background:transparent;border:none;cursor:default}
.pin-key:disabled{opacity:.3;cursor:not-allowed}
.pin-foot{color:rgba(255,255,255,.28);font-size:11px;text-align:center;font-family:'DM Mono',monospace;letter-spacing:.04em;position:relative;z-index:1}

/* ── Toast ── */
.toast{
  position:fixed;left:50%;transform:translateX(-50%) translateY(200%);
  bottom:calc(28px + var(--safe-bot));z-index:400;
  background:var(--ink-2);color:#fff;

const AI_LS = 'cm_anthropic_key';

async function aiCallVision(base64, mediaType, prompt, maxTokens=2048){
  if(!getAIKey()){ throw new Error('API key Anthropic mancante - configurala nelle Impostazioni'); }
  const isPDF = mediaType==='application/pdf';
  const content = [
    isPDF ? {type:'document', source:{type:'base64', media_type:mediaType, data:base64}} 
          : {type:'image',    source:{type:'base64', media_type:mediaType, data:base64}},
    {type:'text', text:prompt}
  ];
  let res;
  try{
    res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers: aiHeaders(),
      body: JSON.stringify({
        model:'claude-sonnet-4-5', max_tokens:maxTokens,
        messages:[
          {role:'user', content},
          {role:'assistant', content:'{'}
        ]
      })
    });
  }catch(netErr){
    // Rete morta, CORS, DNS: il fetch del browser tira "Failed to fetch" che non aiuta l'utente.
    throw new Error('Connessione all\'AI fallita - controlla internet');
  }
  // Status non 2xx: il body potrebbe non essere JSON (es. 529 "Overloaded" torna HTML/testo)
  if(!res.ok){
    let detail = `HTTP ${res.status}`;
    try{
      const j = await res.json();
      if(j?.error?.message) detail = j.error.message;
      else if(j?.error?.type) detail = j.error.type;
    }catch{
      // ignora: status code da solo è già informativo
    }
    // Messaggi più umani per status più comuni
    if(res.status===401) throw new Error('API key Anthropic non valida - ricontrolla nelle Impostazioni');
    if(res.status===429) throw new Error('Troppe richieste AI, riprova tra qualche secondo');
    if(res.status===529 || res.status===503) throw new Error('Servizio AI temporaneamente sovraccarico');
    throw new Error('Errore AI: '+detail);
  }
  let d;
  try{ d = await res.json(); }
  catch{ throw new Error('Risposta AI non leggibile'); }
  if(d.error) throw new Error(d.error.message||'Errore API');
  const txt = '{' + ((d.content||[]).map(b=>b.text||'').join('').replace(/```json|```/g,'').trim());
  try { return JSON.parse(txt); } catch(e){ throw new Error('JSON non valido: '+txt.slice(0,100)); }
}

// Cache correzioni OCR caricate dal server. Aggiornata a ogni login e dopo ogni invio.
let _ocrCorrezioni = [];
// Ultima lettura grezza fatta da Claude (per calcolare diff utente dopo salvataggio)
let _aiLastRead = null;
// Foto scattata durante scan AI (per allegarla alla fattura dopo la creazione)
let _aiLastFoto = null;  // {base64, mediaType}

async function caricaCorrezioniOCR(){
  try{
    const r = await api('/api/ocr-fatture/correzioni?limit=200');
    _ocrCorrezioni = Array.isArray(r) ? r : (r.items || []);
  }catch(e){ _ocrCorrezioni = []; }  // endpoint ancora non deployato? nessun problema, funziona lo stesso
}

function buildPromptFattura(fornitoreHint){
  // Se non ci sono correzioni, usa prompt base (comportamento pre-apprendimento)
  if(!_ocrCorrezioni || !_ocrCorrezioni.length) return PROMPT_FATTURA_BASE;

  // Raggruppa per campo, preferendo correzioni dello stesso fornitore se noto
  const normForn = s => String(s||'').toLowerCase().replace(/[.,]/g,'').trim().replace(/\s+/g,' ');
  const fornKey = normForn(fornitoreHint||'');
  const perCampo = {};
  for(const c of _ocrCorrezioni){
    if(!c.campo || !c.sbagliato || !c.corretto) continue;
    perCampo[c.campo] = perCampo[c.campo] || [];
    perCampo[c.campo].push(c);
  }
  // Ordina dando priorità al fornitore corrente, poi ts decrescente
  for(const k of Object.keys(perCampo)){
    perCampo[k].sort((a,b)=>{
      const aMatch = fornKey && a.fornitore_norm===fornKey ? 0 : 1;
      const bMatch = fornKey && b.fornitore_norm===fornKey ? 0 : 1;
      if(aMatch!==bMatch) return aMatch-bMatch;
      return (b.ts_epoch||0) - (a.ts_epoch||0);
    });
    perCampo[k] = perCampo[k].slice(0, 5);  // max 5 esempi per campo (contiene il prompt)
  }
  const keys = Object.keys(perCampo);
  if(!keys.length) return PROMPT_FATTURA_BASE;

  let add = '\n\n═══ CORREZIONI APPRESE ═══\nApplica OBBLIGATORIAMENTE queste regole basate su correzioni precedenti dell\'utente:';
  for(const campo of keys){
    for(const c of perCampo[campo]){
      const ctx = c.fornitore ? ` (fornitore "${c.fornitore}")` : '';
      add += `\n- campo "${campo}"${ctx}: se leggi qualcosa simile a "${c.sbagliato}", usa "${c.corretto}"`;
    }
  }
  add += '\n\nATTENZIONE: applica le regole sopra anche se il documento mostra una variante leggermente diversa.';
  return PROMPT_FATTURA_BASE + add;
}

// Invia al server il diff tra lettura AI e dati confermati dall'utente
async function inviaCorrezioneOCR(aiRead, userFinal, invoiceId){
  if(!aiRead || !userFinal) return;
  try{
    const r = await api('/api/ocr-fatture/correzione', {
      method: 'POST',
      body: JSON.stringify({
        ai_read: aiRead,
        user_final: userFinal,
        fornitore_context: userFinal.fornitore || aiRead.fornitore || '',
        invoice_id: invoiceId || null,
      }),
    });
    if(r && r.correzioni_registrate > 0){
      // Aggiorna cache locale così la prossima scansione ne beneficia subito
      await caricaCorrezioniOCR();
    }
  }catch(e){
    // Silenzioso: se l'endpoint non è ancora deployato l'app continua a funzionare
    /* errore correzione OCR — silenziato in produzione */
  }
}

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>resolve({base64:r.result.split(',')[1], mediaType:file.type});
    r.onerror=()=>reject(new Error('Lettura file fallita'));
    r.readAsDataURL(file);
  });
}

// ====== JWT helpers ======
// Decodifica payload di un JWT senza verificare la firma (la firma la controlla il server).
// Serve solo a leggere l'exp per sapere se ha senso riusare il token o se è scaduto.
function decodeJWT(token){
  try{
    const part = token.split('.')[1];
    if(!part) return null;
    const b64 = part.replace(/-/g,'+').replace(/_/g,'/');
    const pad = b64.length % 4 ? '='.repeat(4 - (b64.length%4)) : '';
    return JSON.parse(atob(b64 + pad));
  }catch{ return null; }
}
// true se il JWT è presente, decodificabile ed exp è nel futuro (con margine di sicurezza).
function isTokenValid(token, marginSec=30){
  if(!token) return false;
  const p = decodeJWT(token);
  if(!p || !p.exp) return false;
  return (p.exp * 1000) > (Date.now() + marginSec*1000);
}
// Logout "soft": butta il token e rimanda al PIN (non distrugge API_BASE né la chiave AI).
function forceLogout(reason){
  TOKEN = '';
  localStorage.removeItem(LS.token);
  if(reason) toast(reason, 'error');
  showPin();
}

// ====== FATTURA helpers (unica sorgente di verità) ======
// Il backend espone i campi sia in italiano (importo_totale, data_fattura...) sia in inglese
// (total_amount, invoice_date...) a seconda dell'endpoint. Invece di normalizzare a ogni lettura,
// passiamo qualsiasi fattura attraverso normFattura(f) una sola volta e ragioniamo su campi fissi.
//
// IMPORTANTE: il campo booleano "pagato" del backend è un FLAG ("pagata sì/no"), NON l'importo
// pagato. L'importo pagato vero sta in importo_pagato / amount_paid. Non confonderli.
function normFattura(f){
  if(!f || typeof f !== 'object') return f;
  const tot = Number(f.total_amount ?? f.importo_totale ?? f.totale ?? 0) || 0;
  const pag = Number(f.importo_pagato ?? f.amount_paid ?? 0) || 0;
  const residuo = (f.residuo != null) ? Number(f.residuo) : Math.max(0, tot - pag);
  const flagPagataBackend = (f.pagato === true) || (f.stato === 'pagata') || (f.status === 'paid');
  // Una fattura è "pagata" se il backend lo dice esplicitamente OPPURE se il residuo è zero
  // (tolleranza 1 centesimo per arrotondamenti) su un totale > 0.
  const pagata = flagPagataBackend || (residuo <= 0.01 && tot > 0);
  const dataScad = f.data_scadenza || f.due_date || '';
  const scaduta = !pagata && dataScad && (new Date(dataScad) < new Date());
  return {
    ...f,
    _n: {
      id:         f.id || f.invoice_key || f._id || '',
      numero:     f.invoice_number || f.numero_fattura || f.numero_documento || f.numero || '-',
      fornitore:  f.cedente_denominazione || f.supplier_name || f.fornitore_denominazione || f.fornitore_ragione_sociale || '-',
      piva:       f.cedente_piva || f.supplier_vat || f.partita_iva || '',
      dataDoc:    f.data_fattura || f.invoice_date || f.data_documento || '',
      dataScad:   dataScad,
      totale:     tot,
      pagato:     pag,
      residuo:    residuo,
      pagata:     pagata,
      scaduta:    !!scaduta,
    }
  };
}
// Wrapper: accettano sia la fattura originale sia quella già normalizzata (_n presente).
function getResiduoF(f){ return (f && f._n) ? f._n.residuo : normFattura(f)._n.residuo; }
function isPagataF(f){   return (f && f._n) ? f._n.pagata  : normFattura(f)._n.pagata;  }

async function api(path, opts={}){
  const url = API_BASE.replace(/\/$/,'') + path;
  const headers = {'Content-Type':'application/json',...(opts.headers||{})};
  if(TOKEN) headers['Authorization']='Bearer '+TOKEN;
  let res;
  try{
    res = await fetch(url,{...opts,headers});
  }catch(netErr){
    // Errori di rete (offline, DNS, CORS) — messaggio più chiaro del "Failed to fetch"
    throw new Error('Connessione al server fallita');
  }
  // 401/403: JWT scaduto/revocato/mancante → torna al PIN invece di lasciare l'app in stato rotto
  if(res.status===401 || res.status===403){
    forceLogout('Sessione scaduta, reinserisci il PIN');
    throw new Error('Sessione scaduta');
  }
  if(!res.ok){let msg=`HTTP ${res.status}`;try{const j=await res.json();msg=j.detail||j.message||msg;}catch(e){ /* JSON parse fallback — msg già impostato sopra */ }throw new Error(msg);}
  if(res.status===204) return null;
  const ct = res.headers.get('content-type')||'';
  if(ct.includes('json')) return res.json();
  return res.text();
}

function renderDots(){$('pinDots').querySelectorAll('.pin-dot').forEach((d,i)=>{d.classList.remove('err');d.classList.toggle('filled',i<pinBuffer.length);});}
function pinError(msg){const dots=$('pinDots');dots.classList.add('pin-shake');dots.querySelectorAll('.pin-dot').forEach(d=>d.classList.add('err'));const m=$('pinMsg');m.textContent=msg;m.className='pin-msg err';haptic([60,40,60]);setTimeout(()=>{dots.classList.remove('pin-shake');pinBuffer='';renderDots();m.textContent='';m.className='pin-msg';},900);}
function isLocked(){const u=parseInt(localStorage.getItem(LS.lockUntil)||'0');return u>Date.now()?u:0;}
function setLockTimer(){const u=isLocked();if(!u){enablePinPad(true);return;}enablePinPad(false);const s=Math.ceil((u-Date.now())/1000);$('pinMsg').innerHTML=`Bloccato - ${s}s`;$('pinMsg').className='pin-msg err';if(s>0)setTimeout(setLockTimer,1000);else{localStorage.removeItem(LS.lockUntil);localStorage.removeItem(LS.attempts);enablePinPad(true);$('pinMsg').textContent='';}}
function enablePinPad(on){$('pinPad').querySelectorAll('.pin-key').forEach(b=>{if(!b.classList.contains('ghost'))b.disabled=!on;});}
async function onPinKey(k){
  if(isLocked())return;haptic(10);
  if(k==='DEL'){pinBuffer=pinBuffer.slice(0,-1);renderDots();return;}
  if(pinBuffer.length>=6)return;
  pinBuffer+=k;renderDots();
  if(pinBuffer.length===6){
    const h = await sha256(pinBuffer);
    if(h===PIN_HASH){
      localStorage.removeItem(LS.attempts);localStorage.removeItem(LS.lockUntil);
      $('pinMsg').textContent='Verifica server...';$('pinMsg').className='pin-msg';
      // FIX CRITICO: il PIN è valido localmente, ora chiediamo al backend
      // un JWT vero chiamando /api/auth/pin-login. Senza questo TOKEN resta vuoto
      // e tutte le API successive danno 401 "Authentication required".
      const pinPlaintext = pinBuffer;  // salva prima che venga resettato
      try{
        const url = API_BASE.replace(/\/$/,'') + '/api/auth/pin-login';
        const res = await fetch(url, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({pin: pinPlaintext})
        });
        if(!res.ok){
          const err = await res.text();
          throw new Error(`HTTP ${res.status}: ${err.slice(0,200)}`);
        }
        const data = await res.json();
        if(!data.access_token) throw new Error('Server non ha restituito access_token');
        TOKEN = data.access_token;
        localStorage.setItem(LS.token, TOKEN);
        $('pinMsg').textContent='Accesso ok';$('pinMsg').className='pin-msg ok';haptic(20);
        setTimeout(()=>{$('pinScreen').classList.add('hidden');showApp();},200);
      }catch(e){
        $('pinMsg').textContent='Server: '+e.message.slice(0,60);
        $('pinMsg').className='pin-msg err';
        setTimeout(()=>{pinBuffer='';renderDots();$('pinMsg').textContent='';$('pinMsg').className='pin-msg';},3500);
      }
    }else{
      let a=parseInt(localStorage.getItem(LS.attempts)||'0')+1;localStorage.setItem(LS.attempts,String(a));
      if(a>=5){localStorage.setItem(LS.lockUntil,String(Date.now()+30000));pinError(`Troppi tentativi`);setTimeout(setLockTimer,500);}
      else pinError(`PIN errato (${a}/5)`);
    }
  }
}

// Se il JWT scade entro i prossimi N giorni, avvisa l'utente con un toast.
// Non posso fare refresh: il backend non espone un endpoint di refresh, l'unica via
// per rinnovare è ri-fare pin-login dopo scadenza. Quindi mi limito a prevenire la sorpresa.
function checkTokenExpiryWarning(){
  if(!TOKEN) return;
  const p = decodeJWT(TOKEN);
  if(!p || !p.exp) return;
  const msLeft = (p.exp * 1000) - Date.now();
  const oreLeft = msLeft / 3600000;
  const gg = Math.floor(oreLeft / 24);
  if(oreLeft <= 0) return; // già scaduto, verrà gestito alla prossima chiamata API
  if(oreLeft <= 6){
    // Ultime 6 ore: toast persistente
    toast('⚠️ Sessione in scadenza: re-inserisci il PIN entro oggi', 'warn', 8000);
  }else if(gg <= 3){
    toast(`Sessione valida ancora ${gg} ${gg===1?'giorno':'giorni'}`, 'info', 4500);
  }
}

  setTimeout(checkTokenExpiryWarning, 1500);
}

// Usata per: (1) filtro Dashboard 'Prossime scadenze', (2) modulo Costi Ricorrenti.
const RICORRENTI_KEYWORDS = [
  // Energia
  'ENEL','ENI ','ENI S','PLENITUDE','A2A','ACEA','HERA','IREN','EDISON','SORGENIA','2I RETE',
  // Acqua
  'ABC -','ABC ACQUA','ACQUEDOTTO','ACQUALATINA',

  'TIM ','TIM S','VODAFONE','WINDTRE','WIND TRE','FASTWEB','ILIAD','TELECOM','LINKEM','KENA','COOPVOCE','POSTE ITALIANE',

  // Media / TV / Streaming
  'SKY ','SKY I','MEDIASET','RAI ','NETFLIX','SPOTIFY',

function fornitoreEricorrente(nome){
  if(!nome) return false;
  const up = String(nome).toUpperCase();
  return RICORRENTI_KEYWORDS.some(kw => up.includes(kw));
}
function categoriaRicorrente(nome){
  if(!nome) return 'Altro';
  const up = String(nome).toUpperCase();
  if(['ENEL','ENI','PLENITUDE','A2A','ACEA','HERA','IREN','EDISON','SORGENIA','2I RETE'].some(k=>up.includes(k))) return 'Energia';
  if(['ABC -','ABC ACQUA','ACQUEDOTTO','ACQUALATINA'].some(k=>up.includes(k))) return 'Acqua';
  if(['TIM','VODAFONE','WINDTRE','WIND TRE','FASTWEB','ILIAD','TELECOM','LINKEM','KENA','COOPVOCE','POSTE ITALIANE'].some(k=>up.includes(k))) return 'Telco';
  if(['GOOGLE CLOUD','MICROSOFT','AMAZON WEB','AWS','MADBIT','TSPAY','DROPBOX','SLACK','ZOOM','NOTION'].some(k=>up.includes(k))) return 'Software/SaaS';
  if(['SKY','MEDIASET','RAI','NETFLIX','SPOTIFY'].some(k=>up.includes(k))) return 'Media/TV';
  if(['PAGOPA','SIAE'].some(k=>up.includes(k))) return 'Tributi/Diritti';
  return 'Altro';
}

async function salvaFatturaAI(){
  const body = {
    tipo_documento: $('fTipoDoc').value,
    fornitore_denominazione: $('fForn').value.trim(),
    cedente_denominazione: $('fForn').value.trim(),
    partita_iva: $('fPiva')?.value.trim(),
    cedente_piva: $('fPiva')?.value.trim(),
    codice_fiscale: $('fCF')?.value.trim() || null,
    numero_fattura: $('fNum').value.trim(),
    numero_ddt: $('fNumDdt')?.value.trim() || null,
    data_fattura: $('fData').value,
    data_scadenza: $('fScad').value||null,
    importo_totale: parseFloat($('fImp').value)||0,
    totale: parseFloat($('fImp').value)||0,
    iva: parseFloat($('fIva')?.value)||0,
    metodo_pagamento: $('fPag').value||null,
    iban: $('fIban')?.value.trim()||null,
    origine: 'mobile_ai_scan'
  };
  if(!body.fornitore_denominazione) return toast('Fornitore obbligatorio','error');
  if(!body.numero_fattura) return toast('Numero obbligatorio','error');
  if(!body.data_fattura) return toast('Data obbligatoria','error');
  if(body.importo_totale<=0) return toast('Importo non valido','error');

  // Costruisci versione "user_final" con stessa struttura di ai_read (per diff apprendimento)
  const userFinal = {
    tipo_documento: body.tipo_documento,
    fornitore: body.fornitore_denominazione,
    partita_iva: body.partita_iva || '',
    codice_fiscale: body.codice_fiscale || '',
    numero_fattura: body.numero_fattura,
    numero_ddt: body.numero_ddt || '',
    data: body.data_fattura,
    data_scadenza: body.data_scadenza || '',
    importo: body.importo_totale,
    iva: body.iva || 0,
    pagamento: body.metodo_pagamento || '',
    iban: body.iban || '',
  };

  let createdId = null;
  try{
    // Prova endpoint paga-manuale (se la fattura è già pagata) o crea manuale
    const r = await api('/api/fatture-ricevute/paga-manuale',{method:'POST',body:JSON.stringify(body)});
    createdId = r?.id || r?.invoice_id || r?.invoice_key || null;
    toast('Fattura salvata','success');haptic(30);closeSheet();
    if(currentModule==='fatture') reloadModule();
  }catch(e){
    // Fallback generico
    try{
      const r = await api('/api/invoices',{method:'POST',body:JSON.stringify(body)});
      createdId = r?.id || r?.invoice_id || r?.invoice_key || null;
      toast('Fattura salvata','success');haptic(30);closeSheet();
      if(currentModule==='fatture') reloadModule();
    }catch(e2){ toast('Errore: '+e.message,'error'); return; }
  }

  // ═══ Azioni post-salvataggio (non bloccanti) ═══
  // 1. Registra correzioni OCR per apprendimento futuro
  if(_aiLastRead){
    inviaCorrezioneOCR(_aiLastRead, userFinal, createdId);
  }
  // 2. Allega la foto scattata alla fattura appena creata
  if(_aiLastFoto && createdId){
    allegaFotoABase64(createdId, _aiLastFoto.base64, _aiLastFoto.mediaType)
      .catch(() => { /* upload foto fallito — errore gestito dal toast sopra */ });
  }
  // Reset stato scansione
  _aiLastRead = null;
  _aiLastFoto = null;
}

// Carica una foto (dataURL/base64) come allegato di una fattura esistente.
// Il backend si aspetta multipart/form-data.
async function allegaFotoABase64(invoiceId, base64, mediaType){
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
  const blob = new Blob([bytes], {type: mediaType||'image/jpeg'});
  const fd = new FormData();
  fd.append('file', blob, 'fattura_scatto.jpg');

  const url = API_BASE.replace(/\/$/,'') + `/api/invoices/${encodeURIComponent(invoiceId)}/foto`;
  const headers = {};
  if(TOKEN) headers['Authorization'] = 'Bearer '+TOKEN;
  const res = await fetch(url, {method:'POST', headers, body: fd});
  if(res.status===401 || res.status===403){
    forceLogout('Sessione scaduta, reinserisci il PIN');
    throw new Error('Sessione scaduta');
  }
  if(!res.ok){
    const t = await res.text();
    throw new Error(`HTTP ${res.status}: ${t.slice(0,200)}`);
  }
  return res.json();
}

  // Backend /api/dashboard/bilancio-istantaneo restituisce:

        <div class="label">Utile ${ANNO}</div>
        <div class="value" style="font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${euro(utile)}</div>
        <div class="sub">Costi: ${euro(cos)}</div>

        <div class="stat danger"><div class="label">Debito</div><div class="value" style="font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${euro(bilancio.iva.debito||0)}</div></div>

    ${(nFattRic||nCorrisp) ? `
    <div class="card">
      <h3>📄 Documenti ${ANNO}</h3>

        <div class="stat"><div class="label">Fatture ricevute</div><div class="value" style="font-size:20px">${nFattRic}</div></div>

    ${statoR ? `

        <button class="btn btn-ghost btn-sm" onclick="goModule('scadenze')">📅 Scadenze</button>
        <button class="btn btn-ghost btn-sm" onclick="goModule('fatture')">📄 Fatture</button>

    ${alertOggi && (alertOggi.num_alert_compensazione + alertOggi.num_alert_banca + alertOggi.num_alert_xml_mancante > 0) ? `

        </div>`).join('')}
      ${(alertOggi.alert_banca||[]).slice(0,3).map(a => `
        <div class="alert-row warning">
          <div class="a-icon">🏦</div>
          <div class="a-body">
            <div class="a-title" style="font-size:12px">Accredito POS anomalo</div>
            <div class="a-sub" style="font-size:11px">${escapeHtml(a.messaggio || 'Data '+a.data_incasso)}</div>

      ${(alertOggi.alert_xml_mancante||[]).slice(0,3).map(a => `
        <div class="alert-row warning">
          <div class="a-icon">📄</div>
          <div class="a-body">
            <div class="a-title" style="font-size:12px">Manca XML corrispettivo</div>
            <div class="a-sub" style="font-size:11px">${escapeHtml(a.messaggio || a.data)}</div>
          </div>
        </div>`).join('')}
      ${(alertOggi.num_alert_compensazione + alertOggi.num_alert_banca + alertOggi.num_alert_xml_mancante > 9) ? `
        <div style="text-align:center;margin:4px 0 14px;font-size:11px;color:#64748B">
          +${alertOggi.num_alert_compensazione + alertOggi.num_alert_banca + alertOggi.num_alert_xml_mancante - 9} altri alert · <span class="link" onclick="goModule('coerenza-pos')">Vedi tutti</span>

        const cls = gg<0?'danger':(gg<7?'warning':'info');
        return `<div class="alert-row ${cls==='danger'?'danger':(cls==='warning'?'':'info')}">
          <div class="a-icon">${gg<0?'🚨':(gg<7?'⚠️':'📅')}</div>
          <div class="a-body">
            <div class="a-title">${escapeHtml(s.descrizione||s.tipo||'Scadenza')}</div>
            <div class="a-sub">${fmtDate(s.data_scadenza||s.data)} · ${gg<0?`scaduta ${Math.abs(gg)}gg fa`:`tra ${gg}gg`} · ${euro(s.importo||0)}</div>

</script><script>
// =================== COSTI RICORRENTI ===================
// Carica fatture dell'anno corrente + anno precedente, filtra per keyword utility/SaaS,
// raggruppa per categoria/fornitore, calcola spesa mensile e anomalie.
async function render_costi_ricorrenti(main){
  state.costRec = state.costRec || {view:'categorie', cat:null, forn:null, anno:ANNO};
  main.innerHTML = '<div class="loading"><span class="spinner"></span>Analizzo ' + ANNO + '...</div>';

  // Scarica fatture anno corrente e precedente (per confronto)
  const annoPrev = ANNO - 1;
  const [fatCur, fatPrev] = await Promise.all([
    api(`/api/invoices?anno=${ANNO}&limit=5000`).catch(()=>[]),
    api(`/api/invoices?anno=${annoPrev}&limit=5000`).catch(()=>[])
  ]);
  const allFat = [...(Array.isArray(fatCur)?fatCur:[]), ...(Array.isArray(fatPrev)?fatPrev:[])];

  // Filtra solo ricorrenti
  const ric = allFat.filter(f => fornitoreEricorrente(f.supplier_name || f.cedente_denominazione || ''));

  // Aggrega per categoria, per fornitore, per mese
  const byCat = {};   // cat -> {total:0, n:0, fornitori:{}}
  const byForn = {};  // forn -> {cat, total:0, n:0, fatture:[], mese2025:{1:0,...}, mese2026:{1:0,...}, mediaMensile}
  ric.forEach(f => {
    const nome = f.supplier_name || f.cedente_denominazione || '?';
    const cat = categoriaRicorrente(nome);
    const tot = Number(f.total_amount || f.importo_totale || 0);
    const data = f.invoice_date || f.data_fattura || '';
    const anno = String(data).slice(0,4);
    const mese = parseInt(String(data).slice(5,7)) || 0;

    if(!byCat[cat]) byCat[cat] = {total:0, n:0, fornitori:new Set(), curAnno:0};
    byCat[cat].n += 1;
    byCat[cat].total += tot;
    byCat[cat].fornitori.add(nome);
    if(anno === String(ANNO)) byCat[cat].curAnno += tot;

    if(!byForn[nome]) byForn[nome] = {cat, total:0, n:0, curAnno:0, prevAnno:0, fatture:[], perMese:{}};
    byForn[nome].n += 1;
    byForn[nome].total += tot;
    if(anno === String(ANNO)) byForn[nome].curAnno += tot;
    else if(anno === String(annoPrev)) byForn[nome].prevAnno += tot;
    byForn[nome].fatture.push(f);
    const key = `${anno}-${String(mese).padStart(2,'0')}`;
    byForn[nome].perMese[key] = (byForn[nome].perMese[key]||0) + tot;
  });

  // Calcola media mensile e anomalie per ogni fornitore
  Object.values(byForn).forEach(v => {
    const mesi = Object.values(v.perMese).filter(x=>x>0);
    v.mediaMensile = mesi.length ? (mesi.reduce((s,x)=>s+x,0) / mesi.length) : 0;
    // Ultima fattura (mese più recente)
    const keys = Object.keys(v.perMese).sort().reverse();
    v.ultimoMese = keys[0] || null;
    v.ultimoImporto = v.ultimoMese ? v.perMese[v.ultimoMese] : 0;
    // Anomalia: ultima bolletta >30% sopra la media
    v.anomalia = v.mediaMensile > 0 && v.ultimoImporto > v.mediaMensile * 1.3;
  });

  const totAnnoCorrente = Object.values(byForn).reduce((s,v)=>s+v.curAnno,0);
  const totAnnoPrec = Object.values(byForn).reduce((s,v)=>s+v.prevAnno,0);
  const mediaMensileTot = totAnnoCorrente / Math.max(1, new Date().getMonth()+1);  // Spalmato sui mesi trascorsi

  // ======= RENDER =======
  if(state.costRec.view === 'categorie') renderCostiCategorie(main, byCat, byForn, totAnnoCorrente, totAnnoPrec, mediaMensileTot);
  else if(state.costRec.view === 'fornitori') renderCostiFornitori(main, byForn, state.costRec.cat);
  else if(state.costRec.view === 'dettaglio') renderCostiDettaglio(main, byForn, state.costRec.forn);
}

function renderCostiCategorie(main, byCat, byForn, totCur, totPrev, mediaMensile){
  const cats = Object.entries(byCat).sort((a,b)=>b[1].curAnno-a[1].curAnno);
  const anomalie = Object.entries(byForn).filter(([_,v])=>v.anomalia);
  const delta = totPrev>0 ? ((totCur-totPrev)/totPrev*100) : 0;
  main.innerHTML = `
    <div class="stats three">
      <div class="stat accent"><div class="label">Costi ${ANNO}</div><div class="value" style="font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${euro(totCur)}</div><div class="sub">ricorrenti</div></div>
      <div class="stat"><div class="label">Media mese</div><div class="value" style="font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${euro(mediaMensile)}</div><div class="sub">spesa media</div></div>
      <div class="stat ${delta>0?'danger':'success'}"><div class="label">vs ${ANNO-1}</div><div class="value" style="font-size:17px">${delta>0?'+':''}${delta.toFixed(0)}%</div><div class="sub">${euro(totPrev)}</div></div>
    </div>
    ${anomalie.length ? `
    <div class="card" style="background:#fef3c7;border:1px solid #fbbf24;padding:12px">
      <div style="font-weight:700;color:#92400e;margin-bottom:6px">⚠️ ${anomalie.length} bollett${anomalie.length===1?'a':'e'} anomal${anomalie.length===1?'a':'e'}</div>
      ${anomalie.slice(0,3).map(([n,v])=>`<div style="font-size:12px;color:#7c2d12">• ${escapeHtml(n.slice(0,35))}: ultima ${euro(v.ultimoImporto)} (+${Math.round(((v.ultimoImporto/v.mediaMensile-1)*100))}% sulla media)</div>`).join('')}
    </div>`:''}
    <div class="section-title">Categorie</div>
    ${cats.map(([cat,v])=>{
      const info = CATEGORIE_RICORRENTI[cat] || CATEGORIE_RICORRENTI.Altro;
      const nForn = v.fornitori.size;
      return `<div class="list-item" data-cat="${escapeHtml(cat)}" style="padding:14px">
        <div class="li-top">
          <div class="li-title" style="font-size:15px">${info.icon} ${escapeHtml(cat)}<span class="small" style="font-size:11px">${nForn} fornitor${nForn===1?'e':'i'} · ${v.n} fattur${v.n===1?'a':'e'}</span></div>
          <div class="li-amount" style="font-size:13px;color:${info.color}">${euroD(v.curAnno)}</div>
        </div>
      </div>`;
    }).join('')}
    <div style="margin-top:16px;padding:10px;background:#f8fafc;border-radius:10px;border:1px solid #e2e8f0">
      <div style="font-size:11px;color:#475569;line-height:1.5">💡 La lista dei fornitori ricorrenti può essere ampliata modificando <code>RICORRENTI_KEYWORDS</code> nel codice dell'app.</div>
    </div>
  `;
  main.querySelectorAll('.list-item[data-cat]').forEach(el=>{
    el.onclick = ()=>{ state.costRec.view='fornitori'; state.costRec.cat=el.dataset.cat; render_costi_ricorrenti(main); };
  });
}

function renderCostiFornitori(main, byForn, catFilter){
  const lista = Object.entries(byForn).filter(([_,v])=>v.cat===catFilter).sort((a,b)=>b[1].curAnno-a[1].curAnno);
  const info = CATEGORIE_RICORRENTI[catFilter] || CATEGORIE_RICORRENTI.Altro;
  const totCat = lista.reduce((s,[_,v])=>s+v.curAnno,0);
  main.innerHTML = `
    <button class="btn btn-ghost btn-sm" onclick="state.costRec.view='categorie';state.costRec.cat=null;reloadModule()" style="margin-bottom:10px">← Tutte le categorie</button>
    <div class="card" style="background:${info.color}15;border:1px solid ${info.color}44;padding:14px">
      <div style="font-size:15px;font-weight:700;color:${info.color}">${info.icon} ${catFilter}</div>
      <div style="font-size:13px;font-weight:800;margin-top:4px">${euro(totCat)}</div>
      <div style="font-size:11px;color:#475569">Totale ${ANNO} · ${lista.length} fornitor${lista.length===1?'e':'i'}</div>
    </div>
    <div class="section-title">Fornitori</div>
    ${lista.map(([nome,v])=>{
      const deltaPct = v.prevAnno>0 ? ((v.curAnno-v.prevAnno)/v.prevAnno*100) : null;
      return `<div class="list-item" data-forn="${encodeURIComponent(nome)}" style="padding:14px">
        <div class="li-top">
          <div class="li-title">${escapeHtml(nome.slice(0,40))}<span class="small">${v.n} fatt · media ${euro(v.mediaMensile)}/mese</span></div>
          <div class="li-amount">${euroD(v.curAnno)}</div>
        </div>
        <div class="li-bottom">
          ${v.anomalia?'<span class="badge danger">⚠️ anomalia ultima bolletta</span>':''}
          ${deltaPct!==null?`<span class="li-meta">${deltaPct>0?'+':''}${deltaPct.toFixed(0)}% vs ${ANNO-1}</span>`:''}
        </div>
      </div>`;
    }).join('')}
  `;
  main.querySelectorAll('.list-item[data-forn]').forEach(el=>{
    el.onclick = ()=>{ state.costRec.view='dettaglio'; state.costRec.forn=decodeURIComponent(el.dataset.forn); render_costi_ricorrenti(main); };
  });
}

function renderCostiDettaglio(main, byForn, fornName){
  const v = byForn[fornName];
  if(!v){ main.innerHTML='<div class="empty"><div class="icon">❌</div><div class="title">Fornitore non trovato</div></div>'; return; }
  const info = CATEGORIE_RICORRENTI[v.cat] || CATEGORIE_RICORRENTI.Altro;

  // Ordina mesi dal più recente
  const mesi = Object.entries(v.perMese).sort((a,b)=>b[0].localeCompare(a[0]));
  const maxMese = Math.max(...Object.values(v.perMese));

  main.innerHTML = `
    <button class="btn btn-ghost btn-sm" onclick="state.costRec.view='fornitori';state.costRec.forn=null;reloadModule()" style="margin-bottom:10px">← ${escapeHtml(v.cat)}</button>
    <div class="card" style="background:${info.color}15;border:1px solid ${info.color}44;padding:14px">
      <div style="font-size:14px;font-weight:700">${info.icon} ${escapeHtml(fornName)}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">
        <div><div style="font-size:10px;color:#64748B">Totale ${ANNO}</div><div style="font-size:13px;font-weight:700">${euro(v.curAnno)}</div></div>
        <div><div style="font-size:10px;color:#64748B">Media mese</div><div style="font-size:13px;font-weight:700">${euro(v.mediaMensile)}</div></div>
        ${v.prevAnno>0?`<div><div style="font-size:10px;color:#64748B">Totale ${ANNO-1}</div><div style="font-size:14px">${euro(v.prevAnno)}</div></div>`:''}
        <div><div style="font-size:10px;color:#64748B">N. fatture</div><div style="font-size:14px">${v.n}</div></div>
      </div>
      ${v.anomalia?`<div class="alert-row danger" style="margin-top:10px">
        <div class="a-icon">⚠️</div>
        <div class="a-body">
          <div class="a-title" style="font-size:12px">Ultima bolletta anomala</div>
          <div class="a-sub" style="font-size:11px">${euro(v.ultimoImporto)} vs media ${euro(v.mediaMensile)} (+${Math.round(((v.ultimoImporto/v.mediaMensile-1)*100))}%)</div>
        </div>
      </div>`:''}
    </div>

    <div class="section-title">Spesa per mese</div>
    <div class="card" style="padding:12px">
      ${mesi.map(([k, imp])=>{
        const pct = (imp/maxMese)*100;
        const [anno,m] = k.split('-');
        const nomeMese = ['','Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'][parseInt(m)];
        return `<div style="margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
            <span>${nomeMese} ${anno}</span>
            <span style="font-weight:700">${euro(imp)}</span>
          </div>
          <div style="background:#f1f5f9;border-radius:4px;height:6px;overflow:hidden">
            <div style="background:${info.color};height:100%;width:${pct}%"></div>
          </div>
        </div>`;
      }).join('')}
    </div>

    <div class="section-title">Tutte le fatture (${v.fatture.length})</div>
    ${v.fatture.sort((a,b)=>(b.invoice_date||b.data_fattura||'').localeCompare(a.invoice_date||a.data_fattura||'')).map(raw=>{
      const f = normFattura(raw);
      const n = f._n;
      return `<div class="list-item" data-fid="${encodeURIComponent(n.id)}" onclick="openFatturaSheet('${encodeURIComponent(n.id)}')">
        <div class="li-top">
          <div class="li-title">N. ${escapeHtml(n.numero)}<span class="small">${fmtDate(n.dataDoc)}</span></div>
          <div class="li-amount">${euroD(n.totale)}</div>
        </div>
        <div class="li-bottom">
          ${n.pagata?'<span class="badge success">Pagata</span>':'<span class="badge info">Da pagare</span>'}
        </div>
      </div>`;
    }).join('')}
  `;
}
</script><script>
async function render_prima_nota_cassa(main){
  state.pnc = state.pnc || {mese:null};
  const params = new URLSearchParams({anno:String(ANNO)});
  if(state.pnc.mese){
    const m = String(state.pnc.mese).padStart(2,'0');
    // Backend non supporta ?mese: usa data_da/data_a invece
    params.set('data_da', `${ANNO}-${m}-01`);
    const ultimo = new Date(ANNO, state.pnc.mese, 0).getDate();
    params.set('data_a', `${ANNO}-${m}-${ultimo}`);
  }
  const data = await api(`/api/prima-nota/cassa?${params}`).catch(()=>({}));
  const movs = (()=>{const raw=Array.isArray(data)?data:(data.items||data.movimenti||data.cassa||[]);const seen=new Set();return raw.filter(m=>{const k=m.id||m._id;if(!k||seen.has(k))return !k;seen.add(k);return true;});})();
  // Il backend restituisce tipo='entrata'/'uscita' + importo POSITIVO, e totali aggregati già calcolati.
  // Usali se presenti, altrimenti ricalcola.
  const isEntrata = m => m.tipo==='entrata' || Number(m.importo)>0 && !m.tipo;
  const entr = Number(data.totale_entrate ?? movs.filter(m=>isEntrata(m)).reduce((s,m)=>s+Math.abs(Number(m.importo||0)),0));
  const usc  = Number(data.totale_uscite  ?? movs.filter(m=>!isEntrata(m)).reduce((s,m)=>s+Math.abs(Number(m.importo||0)),0));
  const saldoAnno = Number(data.saldo_anno ?? (entr - usc));
  const saldoTot  = Number(data.saldo ?? saldoAnno);
  // Totali per categoria (client-side)
  const signedImp = m => (isEntrata(m) ? 1 : -1) * Math.abs(Number(m.importo||0));
  const totCorrisp = movs.filter(m=>(m.categoria||'').toLowerCase()==='corrispettivi').reduce((s,m)=>s+Math.abs(Number(m.importo||0)),0);
  const totPOS = movs.filter(m=>(m.categoria||'').toLowerCase()==='pos').reduce((s,m)=>s+Math.abs(Number(m.importo||0)),0);
  const totVers = movs.filter(m=>{const c=(m.categoria||'').toLowerCase();return c==='versamento'||c==='versamenti';}).reduce((s,m)=>s+Math.abs(Number(m.importo||0)),0);
  const totFatt = movs.filter(m=>m.fattura_id||(m.categoria||'').toLowerCase().includes('fattura')).reduce((s,m)=>s+Math.abs(Number(m.importo||0)),0);
  // Ordina per data desc
  movs.sort((a,b)=>(b.data||'').localeCompare(a.data||''));

  // ═══ Arricchimento fatture collegate ═══
  // Il backend espone solo fattura_id (ObjectID). Per mostrare numero+fornitore in chiaro,
  // carichiamo l'elenco fatture dell'anno UNA volta e costruiamo una mappa id → {num, forn, importo}.
  // Cache in memoria della sessione: il prossimo rendering del modulo non riparte da zero.
  window._fatCache = window._fatCache || {};
  const needFat = movs.some(m => m.fattura_id);
  if(needFat && !window._fatCache[ANNO]){
    try{
      const fatData = await api(`/api/invoices?anno=${ANNO}&limit=1000`).catch(()=>[]);
      const fatList = Array.isArray(fatData) ? fatData : (fatData.items||fatData.invoices||fatData.fatture||[]);
      const map = {};
      for(const raw of fatList){
        const n = normFattura(raw)._n;
        if(n.id) map[n.id] = { numero: n.numero, fornitore: n.fornitore, totale: n.totale };
      }
      window._fatCache[ANNO] = map;
    }catch(e){
      window._fatCache[ANNO] = {}; // cache vuota ma presente: evita retry continui
    }
  }
  const fatMap = window._fatCache[ANNO] || {};
  // Helper: dato un movimento, ritorna un'etichetta umana della fattura collegata (o null).
  const fatLabel = m => {
    if(!m.fattura_id) return null;
    const f = fatMap[String(m.fattura_id)];
    if(f) return { text: `${f.fornitore} · N. ${f.numero}`, found: true };
    return { text: '🔗 Fattura collegata', found: false };
  };

  main.innerHTML = `
    <div class="stats three">
      <div class="stat success"><div class="label">Entrate ${ANNO}</div><div class="value" style="font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${euro(entr)}</div></div>
      <div class="stat danger"><div class="label">Uscite ${ANNO}</div><div class="value" style="font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${euro(usc)}</div></div>
      <div class="stat ${saldoAnno>=0?'accent':'danger'}"><div class="label">Saldo ${ANNO}</div><div class="value" style="font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${euro(saldoAnno)}</div></div>
    </div>
    <div class="stats" style="grid-template-columns:1fr 1fr;gap:8px">
      <div class="stat" style="padding:10px"><div class="label" style="font-size:9px">Corrisp.</div><div class="value" style="font-size:12px;color:#ff9800">${euro(totCorrisp)}</div></div>
      <div class="stat" style="padding:10px"><div class="label" style="font-size:9px">POS</div><div class="value" style="font-size:12px;color:#1e3a5f">${euro(totPOS)}</div></div>
      <div class="stat" style="padding:10px"><div class="label" style="font-size:9px">Versam.</div><div class="value" style="font-size:12px;color:#059669">${euro(totVers)}</div></div>
      <div class="stat" style="padding:10px"><div class="label" style="font-size:9px">Fatture</div><div class="value" style="font-size:12px;color:#ef4444">${euro(totFatt)}</div></div>
    </div>
    <div class="card" style="padding:12px;background:#f8fafc;border:1px solid #e2e8f0">
      <div style="font-weight:700;font-size:14px;margin-bottom:10px">⚡ Chiusure giornaliere</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <button class="btn btn-warning btn-sm" style="padding:12px 8px;font-size:13px" onclick="apriFormCorrisp()">📊 Corrispettivo</button>
        <button class="btn btn-sm" style="background:#1e3a5f;color:#fff;padding:12px 8px;font-size:13px" onclick="apriFormPOS()">💳 POS</button>
        <button class="btn btn-success btn-sm" style="padding:12px 8px;font-size:13px" onclick="apriFormVers()">🏦 Versamento</button>
        <button class="btn btn-sm" style="background:#f97316;color:#fff;padding:12px 8px;font-size:13px" onclick="apriFormAltro('cassa')">✏️ Altro</button>
      </div>
    </div>
    <div class="month-selector">
      <button class="m ${!state.pnc.mese?'active':''}" data-mese="">Tutti</button>
      ${getMesi().map(m=>`<button class="m ${state.pnc.mese===m.n?'active':''}" data-mese="${m.n}">${m.label}</button>`).join('')}
    </div>
    <div class="section-title">Movimenti (${movs.length}) <span class="link" onclick="syncFatturePagate()">🔄 Sync fatture</span></div>
    <div id="lstC">${movs.length ? movs.map(m=>{
      const imp = Math.abs(Number(m.importo||0));
      const pos = isEntrata(m);
      const cat = (m.categoria||'').toLowerCase();
      const catColor = cat==='corrispettivi'?'#ff9800':(cat==='pos'?'#1e3a5f':(cat==='versamento'||cat==='versamenti'?'#059669':(m.fattura_id?'#ef4444':'#64748B')));
      const fl = fatLabel(m);
      return `<div class="list-item" data-mov='${encodeURIComponent(JSON.stringify(m))}'>
        <div class="li-top">
          <div class="li-title">${escapeHtml(m.descrizione||m.categoria||'-')}<span class="small">${fmtDate(m.data)}</span></div>
          <div class="li-amount ${pos?'positive':'negative'}">${pos?'+':'-'}${euroD(imp)}</div>
        </div>
        <div class="li-bottom">
          <span class="badge" style="background:${catColor};color:#fff">${escapeHtml(m.categoria||(pos?'Entrata':'Uscita'))}</span>
          ${m.provvisorio?'<span class="badge warning">Provvisorio</span>':''}
          ${fl ? `<span class="li-meta" style="color:${fl.found?'var(--primary)':'var(--text-2)'};font-weight:${fl.found?'600':'400'}">${escapeHtml(fl.text)}</span>` : ''}
        </div>
      </div>`;
    }).join('') : '<div class="empty"><div class="icon">💰</div><div class="title">Nessun movimento cassa</div></div>'}</div>
  `;
  main.querySelectorAll('.month-selector .m').forEach(b=>{
    b.onclick = ()=>{ state.pnc.mese = b.dataset.mese ? parseInt(b.dataset.mese) : null; render_prima_nota_cassa(main); };
  });
  main.querySelectorAll('.list-item[data-mov]').forEach(el=>{
    el.onclick = ()=>openMovimentoSheet('cassa', JSON.parse(decodeURIComponent(el.dataset.mov)));
  });
  $('fab').classList.add('hidden');
}

async function syncFatturePagate(){
  if(!confirm(`Sincronizzare fatture pagate in cassa per l'anno ${ANNO}?`)) return;
  try{
    await api(`/api/prima-nota/cassa/sync-fatture-pagate?anno=${ANNO}`, {method:'POST'});
    toast('Sync completata','success'); reloadModule();
  }catch(e){ toast('Errore: '+e.message,'error'); }
}

function openMovimentoSheet(tipo, m){
  // Se il movimento è collegato a una fattura, costruiamo una card cliccabile con numero+fornitore
  // (presi dalla cache caricata da render_prima_nota_cassa) invece dell'ID grezzo.
  let fatBlock = '';
  if(m.fattura_id){
    const fatMap = (window._fatCache || {})[ANNO] || {};
    const f = fatMap[String(m.fattura_id)];
    const fid = encodeURIComponent(String(m.fattura_id));
    if(f){
      fatBlock = `<div class="kv" style="cursor:pointer;padding:12px;background:var(--primary-soft);border-radius:10px;margin:8px 0" onclick="closeSheet();setTimeout(()=>openFatturaSheet('${fid}'),150)">
        <span class="k" style="color:var(--primary);font-weight:700">🔗 Fattura collegata</span>
        <span class="v" style="text-align:right">
          <div style="font-weight:700">${escapeHtml(f.fornitore)}</div>
          <div style="font-size:12px;color:var(--text-2)">N. ${escapeHtml(f.numero)} · ${euro(f.totale)}</div>
          <div style="font-size:11px;color:var(--primary);margin-top:2px">Tocca per aprire →</div>
        </span>
      </div>`;
    }else{
      // Fattura non trovata nella cache dell'anno corrente: può essere di un anno diverso
      fatBlock = `<div class="kv"><span class="k">🔗 Fattura</span><span class="v" style="font-size:12px;color:var(--text-2)">collegata (dettaglio non disponibile)</span></div>`;
    }
  }
  // Segno e colore dell'importo sempre coerenti col tipo di movimento.
  // Il backend salva sempre l'importo POSITIVO + campo tipo="entrata"|"uscita", quindi
  // ricostruiamo qui il segno per la visualizzazione.
  const isEntrataMov = m.tipo==='entrata' || (Number(m.importo)>0 && !m.tipo);
  const impAbs = Math.abs(Number(m.importo||0));
  const impSegnato = (isEntrataMov ? 1 : -1) * impAbs;
  const impColor = isEntrataMov ? 'var(--success)' : 'var(--danger)';
  // Mostra riferimento testuale solo se non è un codice tecnico interno
  // quando c'è già la card "Fattura collegata", un ID grezzo sarebbe rumore duplicato.
  const rifText = String(m.riferimento||'').trim();
  const rifIsTechnical = /^(FATT-|[0-9a-f]{24}$|[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})/i.test(rifText);
  const showRif = rifText && !rifIsTechnical && !fatBlock;
  openSheet(`<h2>Movimento ${tipo}</h2>
    <div class="kv"><span class="k">Data</span><span class="v">${fmtDate(m.data)}</span></div>
    <div class="kv"><span class="k">Descrizione</span><span class="v">${escapeHtml(m.descrizione||'-')}</span></div>
    <div class="kv"><span class="k">Importo</span><span class="v" style="color:${impColor};font-weight:800">${euroD(impSegnato)}</span></div>
    <div class="kv"><span class="k">Categoria</span><span class="v">${escapeHtml(m.categoria||'-')}</span></div>
    ${m.provvisorio?`<div class="kv"><span class="k">Stato</span><span class="v"><span class="badge warning">Provvisorio</span></span></div>`:''}
    ${showRif?`<div class="kv"><span class="k">Riferimento</span><span class="v">${escapeHtml(rifText)}</span></div>`:''}
    ${m.note?`<div class="kv"><span class="k">Note</span><span class="v">${escapeHtml(m.note)}</span></div>`:''}
    ${fatBlock}
    <div style="margin-top:16px;display:grid;gap:8px">
      ${m.id && tipo==='banca' ? `<button class="btn btn-ghost btn-block" onclick='apriFormEditBanca(${JSON.stringify({id:m.id,data:(m.data||"").slice(0,10),importo:m.importo,descrizione:m.descrizione,categoria:m.categoria,tipo:m.tipo}).replace(/'/g,"&#39;")})'>✏️ Modifica</button>` : ''}
      ${m.id && tipo!=='banca' ?`<button class="btn btn-ghost btn-block" onclick='apriFormAltro("${tipo}",${JSON.stringify({id:m.id,data:(m.data||"").slice(0,10),importo:m.importo,descrizione:m.descrizione,categoria:m.categoria,tipo:m.tipo}).replace(/'/g,"&#39;")})'>✏️ Modifica</button>`:''}
      ${m.id && tipo==='cassa' ? `<button class="btn btn-ghost btn-block" onclick="spostaMovimento('${m.id}','cassa','banca')">➡️ Sposta in banca</button>`:''}
      ${m.id && tipo==='banca' ? `<button class="btn btn-ghost btn-block" onclick="spostaMovimento('${m.id}','banca','cassa')">⬅️ Sposta in cassa</button>`:''}
      ${m.id?`<button class="btn btn-danger btn-block" onclick="deleteMovimento('${tipo}','${m.id}')">🗑 Elimina</button>`:''}
      <button class="btn btn-ghost btn-block" onclick="closeSheet()">Chiudi</button>
    </div>`);
}

async function deleteMovimento(tipo, id){
  if(!confirm('Eliminare questo movimento?')) return;
  try{
    const res = await api(`/api/prima-nota/${tipo}/${id}`, {method:'DELETE'});
    // Il backend può restituire status='warning' con require_force=true
    // (es. movimento confermato o collegato a fattura) — chiedi conferma esplicita
    if(res && res.status === 'warning' && res.require_force){
      const msgs = (res.warnings||[]).join('\n');
      if(!confirm(`⚠️ ${msgs}\n\nConfermi l'eliminazione forzata?`)) return;
      await api(`/api/prima-nota/${tipo}/${id}?force=true`, {method:'DELETE'});
    }
    toast('Movimento eliminato','success');closeSheet();reloadModule();
  }catch(e){ toast('Errore: '+e.message,'error'); }
}

async function spostaMovimento(id, da, a){
  if(!confirm(`Spostare da ${da} a ${a}?`)) return;
  try{
    await api('/api/prima-nota/sposta-scrittura',{
      method:'POST',
      body:JSON.stringify({movimento_id:id, destinazione:a})
    });
    toast('Spostato','success');closeSheet();reloadModule();
  }catch(e){ toast('Errore: '+e.message,'error'); }
}

function apriFormCorrisp(){
  const oggi = new Date().toISOString().slice(0,10);
  openSheet(`<h2>📊 Chiusura giornaliera</h2>
    <p class="muted" style="margin:0 0 12px;font-size:12px">Incasso giornaliero. Solo i <b>contanti</b> entrano in cassa. POS va in banca. IVA 10%.</p>

    <div class="field"><label>💳 POS incassato (€)</label>
      <input id="fCorrPos" class="input" type="number" step="0.01" inputmode="decimal" placeholder="0,00" oninput="ricalcCorr()"></div>
    <div class="card" style="padding:12px;background:#F1F5F9;margin:10px 0">
      <div class="kv"><span class="k">Totale lordo</span><span class="v" id="fCorrTot" style="font-weight:800">€ 0,00</span></div>
      <div class="kv"><span class="k">Imponibile (senza IVA 10%)</span><span class="v" id="fCorrImp">€ 0,00</span></div>
      <div class="kv"><span class="k">IVA 10%</span><span class="v" id="fCorrIva">€ 0,00</span></div>
    </div>
    <button class="btn btn-warning btn-block" style="padding:14px" onclick="salvaFormCorrisp()">💾 Salva chiusura</button>
    <button class="btn btn-ghost btn-block" style="margin-top:8px" onclick="closeSheet()">Annulla</button>`);
  setTimeout(()=>$('fCorrCont')?.focus(),100);
}
function ricalcCorr(){
  const cont = parseFloat($('fCorrCont')?.value)||0;
  const pos = parseFloat($('fCorrPos')?.value)||0;
  const tot = cont+pos;
  const imp = tot/1.10;
  const iva = tot-imp;
  if($('fCorrTot')) $('fCorrTot').textContent = euro(tot);
  if($('fCorrImp')) $('fCorrImp').textContent = euro(imp);
  if($('fCorrIva')) $('fCorrIva').textContent = euro(iva);
}
async function salvaFormCorrisp(){
  const data=$('fCorrData').value;
  const cont = parseFloat($('fCorrCont').value)||0;
  const pos = parseFloat($('fCorrPos').value)||0;
  if(cont===0 && pos===0) return toast('Inserisci contanti o POS','error');
  const totale = cont+pos;
  try{
    // 1. Registra corrispettivo completo (entrambi contanti+POS) nel modulo corrispettivi se possibile
    try{
      await api('/api/corrispettivi',{method:'POST',body:JSON.stringify({
        data, contanti:cont, pos:pos, totale:totale,
        imponibile: Math.round((totale/1.10)*100)/100,
        iva: Math.round((totale-totale/1.10)*100)/100,
        aliquota_iva: 10,
        origine:'mobile_chiusura'
      })});
    }catch(e){ /* registrazione cassa secondaria — errore non bloccante */ }
    // 2. In cassa va solo il contante (DARE)
    if(cont>0){
      await api('/api/prima-nota/cassa',{method:'POST',body:JSON.stringify({
        data, tipo:'entrata', importo:cont,
        descrizione:`Corrispettivo contanti ${data}`,
        categoria:'Corrispettivi', source:'manual_entry', provvisorio:true
      })});
    }
    // 3. POS: in banca come accredito (quando arriva) - NON in cassa
    if(pos>0){
      try{
        await api('/api/prima-nota/banca',{method:'POST',body:JSON.stringify({
          data, tipo:'entrata', importo:pos,
          descrizione:`POS corrispettivo ${data} (atteso accredito)`,
          categoria:'POS', source:'manual_pos', provvisorio:true
        })});
      }catch(e){ /* registrazione banca secondaria — errore non bloccante */ }
    }
    toast('Chiusura salvata','success');haptic(30);closeSheet();reloadModule();
  }catch(e){toast('Errore: '+e.message,'error');}
}

async function render_corrispettivi(main){
  const [corr, cassa] = await Promise.all([
    api(`/api/corrispettivi?anno=${ANNO}&limit=2500`).catch(()=>[]),
    api(`/api/prima-nota/cassa?anno=${ANNO}`).catch(()=>[]),
  ]);
  const listCorr = Array.isArray(corr)?corr:(corr.items||[]);
  const listCassa = Array.isArray(cassa)?cassa:(cassa.items||cassa.movimenti||[]);
  const perDay = {};
  for(const c of listCorr){
    const d = (c.data||'').slice(0,10); if(!d) continue;
    perDay[d] = perDay[d] || {data:d, corrispettivo:0, pos:0, versamento:0, altro_entrate:0, altro_uscite:0, raw_corr:[], raw_cassa:[]};
    perDay[d].corrispettivo += Number(c.totale||c.incasso||(Number(c.contanti||0)+Number(c.pos||c.elettronico||0))||0);
    perDay[d].raw_corr.push(c);
  }
  for(const m of listCassa){
    const d = (m.data||'').slice(0,10); if(!d) continue;
    perDay[d] = perDay[d] || {data:d, corrispettivo:0, pos:0, versamento:0, altro_entrate:0, altro_uscite:0, raw_corr:[], raw_cassa:[]};
    const cat = (m.categoria||'').toLowerCase();
    const imp = Math.abs(Number(m.importo||0));
    const isEntrata = Number(m.importo||0)>=0 || m.tipo==='entrata';
    if(cat==='pos') perDay[d].pos += imp;
    else if(cat==='versamento'||cat==='versamenti') perDay[d].versamento += imp;
    else if(cat==='corrispettivi' && isEntrata) { /* già contato in raw_corr se presente */ }
    else if(isEntrata) perDay[d].altro_entrate += imp;
    else perDay[d].altro_uscite += imp;
    perDay[d].raw_cassa.push(m);
  }
  // Se un giorno non ha corrispettivo XML ma solo provvisorio da cassa
  for(const m of listCassa){
    const d = (m.data||'').slice(0,10); if(!d) continue;
    const cat = (m.categoria||'').toLowerCase();
    if(cat==='corrispettivi' && (Number(m.importo||0)>0 || m.tipo==='entrata') && perDay[d] && perDay[d].raw_corr.length===0){
      perDay[d].corrispettivo += Math.abs(Number(m.importo||0));
    }
  }
  const days = Object.values(perDay).sort((a,b)=>b.data.localeCompare(a.data));
  const tot_corr = days.reduce((s,d)=>s+d.corrispettivo,0);

async function salvaChiusura(data){
  const corr = parseFloat($('cgCorr').value)||0;
  const pos  = parseFloat($('cgPos').value)||0;
  const vers = parseFloat($('cgVers').value)||0;
  if(corr===0 && pos===0 && vers===0) return toast('Inserisci almeno un importo','error');
  try{
    if(corr>0){
      await api('/api/prima-nota/cassa',{method:'POST',body:JSON.stringify({
        data, tipo:'entrata', importo:corr,
        descrizione:`Corrispettivo giornaliero ${data} (provvisorio)`,
        categoria:'Corrispettivi', source:'manual_entry', provvisorio:true
      })});
    }
    if(pos>0){
      await api('/api/prima-nota/cassa',{method:'POST',body:JSON.stringify({
        data, tipo:'uscita', importo:pos,
        descrizione:`POS giornaliero ${data} (provvisorio)`,
        categoria:'POS', source:'manual_pos', provvisorio:true
      })});
    }
    if(vers>0){
      await api('/api/prima-nota/cassa',{method:'POST',body:JSON.stringify({
        data, tipo:'uscita', importo:vers,
        descrizione:`Versamento in banca ${data}`,
        categoria:'Versamento', source:'manual_entry'
      })});
    }
    toast('Chiusura salvata','success');haptic(30);closeSheet();reloadModule();
  }catch(e){toast('Errore: '+e.message,'error');}
}

  const valoreSuggerito = xml > 0 ? xml.toFixed(2) : posReale.toFixed(2);

  openSheet(`<div style="padding-bottom:12px">

      <label style="font-size:12px;font-weight:700;color:#334155">Nota (opzionale)</label>
      <input id="notaPosReale" class="input" type="text" placeholder="es. Correzione chiusura sbagliata" maxlength="200">
    </div>

    ${diffAttuale !== null && Math.abs(diffAttuale) > 5 ? `
    <div class="alert-row warning" style="margin-top:12px">
      <div class="a-icon">⚠️</div>
      <div class="a-body">

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:18px">

  </div>`);

  // Focus automatico sul campo
  setTimeout(()=>{
    const inp = document.getElementById('nuovoPosReale');

async function salvaModificaPosReale(dataStr){
  const inp = document.getElementById('nuovoPosReale');
  const nota = (document.getElementById('notaPosReale')?.value || '').trim();
  if(!inp){ return; }
  const valore = parseFloat(String(inp.value).replace(',','.'));
  if(isNaN(valore) || valore < 0){
    toast('Importo non valido', 'error');
    inp.focus();
    return;
  }
  // Disabilita bottoni durante il salvataggio
  try{
    const body = { data: dataStr, importo: Math.round(valore*100)/100 };
    if(nota) body.note = nota;
    const resp = await api('/api/pos-corrispettivi/chiusura-giornaliera', {
      method: 'PUT',
      body: JSON.stringify(body)
    });
    if(resp.action === 'noop'){
      toast('Nessuna modifica (importo identico)', 'info');
    } else {
      toast(resp.action === 'created' ? 'Chiusura POS creata' : 'POS reale aggiornato', 'success');
      haptic(30);
    }
    closeSheet();
    // Riapri il dettaglio del mese per mostrare la modifica
    const mese = state._coerenzaPOS?.mese;
    if(mese) apriDettaglioCoerenzaMese(mese);
    else reloadModule();
  }catch(e){
    toast('Errore salvataggio: '+(e?.message||'server'), 'error');
  }
}

  catch(e){toast('Errore: '+e.message,'error');}
}

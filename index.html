<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ceraldi · Gestionale</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --violet: #5D29C7;
  --violet-light: #7B4FD6;
  --violet-dark: #4A1FA0;
  --navy: #1E1B4B;
  --navy-light: #2D2A6B;
  --gold: #F59E0B;
  --green: #10B981;
  --red: #EF4444;
  --bg: #0F0E1A;
  --surface: #1A1830;
  --surface2: #232140;
  --border: rgba(255,255,255,0.08);
  --text: #F1F0FF;
  --text2: #9896B8;
  --text3: #6663A0;
  --radius: 16px;
  --radius-sm: 10px;
  --font: 'Plus Jakarta Sans', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  max-width: 430px;
  margin: 0 auto;
  position: relative;
  overflow-x: hidden;
}

/* ── AUTH ── */
#auth-screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 32px;
  background: radial-gradient(ellipse at 50% 0%, rgba(93,41,199,0.4) 0%, transparent 65%),
              var(--bg);
}

.logo-wrap {
  width: 80px; height: 80px;
  background: linear-gradient(135deg, var(--violet), var(--navy-light));
  border-radius: 24px;
  display: flex; align-items: center; justify-content: center;
  font-size: 36px; font-weight: 800; color: #fff;
  margin-bottom: 24px;
  box-shadow: 0 20px 60px rgba(93,41,199,0.4);
}

.auth-title { font-size: 26px; font-weight: 800; margin-bottom: 6px; text-align: center; }
.auth-sub { font-size: 14px; color: var(--text2); margin-bottom: 48px; text-align: center; }

.pin-dots {
  display: flex; gap: 12px; margin-bottom: 12px;
}
.pin-dot {
  width: 14px; height: 14px; border-radius: 50%;
  border: 2px solid var(--text3);
  transition: all 0.2s;
}
.pin-dot.filled { background: var(--violet); border-color: var(--violet); transform: scale(1.1); }

.pin-error { font-size: 13px; color: var(--red); min-height: 20px; margin-bottom: 24px; text-align: center; }

.pin-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 12px; width: 100%; max-width: 280px;
}
.pin-btn {
  height: 68px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font);
  font-size: 22px; font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.pin-btn:active { transform: scale(0.94); background: var(--surface2); }
.pin-btn.del { font-size: 18px; color: var(--text2); }
.pin-btn.zero { grid-column: 2; }

/* ── APP SHELL ── */
#app { display: none; flex-direction: column; min-height: 100vh; }

.topbar {
  padding: 16px 20px 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.topbar-title { font-size: 17px; font-weight: 700; }
.topbar-sub { font-size: 12px; color: var(--text2); }
.topbar-date { font-size: 12px; color: var(--text3); font-weight: 500; }

.content { flex: 1; padding: 20px 16px 100px; overflow-y: auto; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 8px 0 20px;
  z-index: 200;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 4px;
  padding: 6px 0;
  cursor: pointer;
  color: var(--text3);
  font-size: 10px; font-weight: 600;
  transition: color 0.2s;
  border: none; background: none;
}
.nav-item.active { color: var(--violet-light); }
.nav-icon { font-size: 22px; line-height: 1; }

/* ── CARDS ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 12px;
}
.card-title { font-size: 13px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 16px; }

.stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.stat-box {
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 14px;
}
.stat-label { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
.stat-value { font-size: 20px; font-weight: 800; margin-top: 4px; }
.stat-value.green { color: var(--green); }
.stat-value.violet { color: var(--violet-light); }
.stat-value.gold { color: var(--gold); }

/* ── FORM ELEMENTS ── */
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
.field input, .field select, .field textarea {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  padding: 12px 14px;
  outline: none;
  transition: border-color 0.2s;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--violet);
}
.field select option { background: var(--navy); }

.btn {
  width: 100%;
  padding: 15px;
  border: none; border-radius: var(--radius-sm);
  font-family: var(--font);
  font-size: 15px; font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-primary { background: var(--violet); color: #fff; }
.btn-primary:active { background: var(--violet-dark); transform: scale(0.98); }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── TOAST ── */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 20px;
  font-size: 14px; font-weight: 600;
  z-index: 999; white-space: nowrap;
  transition: all 0.3s;
  max-width: 90vw;
  text-align: center;
}
.toast.ok { border-color: var(--green); color: var(--green); }
.toast.err { border-color: var(--red); color: var(--red); }
.toast.hidden { opacity: 0; pointer-events: none; transform: translateX(-50%) translateY(-10px); }

/* ── LIST ITEMS ── */
.list-item {
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 14px;
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer;
  transition: background 0.15s;
}
.list-item:active { background: var(--surface); }
.list-icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.list-icon.violet { background: rgba(93,41,199,0.2); }
.list-icon.green { background: rgba(16,185,129,0.15); }
.list-icon.gold { background: rgba(245,158,11,0.15); }
.list-body { flex: 1; min-width: 0; }
.list-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
.list-amount { font-size: 16px; font-weight: 700; text-align: right; flex-shrink: 0; }
.list-amount.green { color: var(--green); }
.list-amount.red { color: var(--red); }

/* ── SECTION HEADER ── */
.section-header {
  font-size: 20px; font-weight: 800;
  margin-bottom: 16px;
  display: flex; align-items: center; gap: 10px;
}

.badge {
  font-size: 11px; font-weight: 700; padding: 3px 8px;
  border-radius: 20px; background: rgba(93,41,199,0.2); color: var(--violet-light);
}

/* ── LOADING ── */
.spinner {
  width: 24px; height: 24px;
  border: 3px solid rgba(255,255,255,0.1);
  border-top-color: var(--violet-light);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

.empty { text-align: center; padding: 40px 20px; color: var(--text3); }
.empty-icon { font-size: 40px; margin-bottom: 12px; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 500;
  display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface);
  border-radius: 24px 24px 0 0;
  padding: 24px 20px 40px;
  width: 100%;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  max-height: 90vh;
  overflow-y: auto;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
.modal-title { font-size: 18px; font-weight: 800; margin-bottom: 20px; }

/* ── TABS ── */
.tab-bar {
  display: flex; gap: 8px; margin-bottom: 20px;
  overflow-x: auto; padding-bottom: 2px;
}
.tab-bar::-webkit-scrollbar { display: none; }
.tab {
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: none;
  color: var(--text2);
  font-family: var(--font);
  font-size: 13px; font-weight: 600;
  cursor: pointer; white-space: nowrap;
  transition: all 0.2s;
}
.tab.active { background: var(--violet); color: #fff; border-color: var(--violet); }

/* ── PROVVISORI ── */
.prov-badge {
  font-size: 10px; font-weight: 700;
  padding: 2px 7px; border-radius: 10px;
  background: rgba(245,158,11,0.15); color: var(--gold);
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="logo-wrap">C</div>
  <div class="auth-title">Ceraldi Group</div>
  <div class="auth-sub">Inserisci il PIN di accesso</div>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
    <div class="pin-dot" id="d4"></div>
    <div class="pin-dot" id="d5"></div>
  </div>
  <div class="pin-error" id="pin-error"></div>
  <div class="pin-grid">
    <button class="pin-btn" onclick="pinPress('1')">1</button>
    <button class="pin-btn" onclick="pinPress('2')">2</button>
    <button class="pin-btn" onclick="pinPress('3')">3</button>
    <button class="pin-btn" onclick="pinPress('4')">4</button>
    <button class="pin-btn" onclick="pinPress('5')">5</button>
    <button class="pin-btn" onclick="pinPress('6')">6</button>
    <button class="pin-btn" onclick="pinPress('7')">7</button>
    <button class="pin-btn" onclick="pinPress('8')">8</button>
    <button class="pin-btn" onclick="pinPress('9')">9</button>
    <button class="pin-btn zero" onclick="pinPress('0')">0</button>
    <button class="pin-btn del" onclick="pinDel()">⌫</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div>
      <div class="topbar-title" id="page-title">Oggi</div>
      <div class="topbar-sub">Ceraldi Group</div>
    </div>
    <div class="topbar-date" id="topbar-date"></div>
  </div>

  <div class="content" id="content"></div>

  <nav class="bottom-nav">
    <button class="nav-item active" onclick="nav('home')" id="nav-home">
      <span class="nav-icon">🏠</span>Home
    </button>
    <button class="nav-item" onclick="nav('corrispettivi')" id="nav-corrispettivi">
      <span class="nav-icon">🧾</span>Corrispettivi
    </button>
    <button class="nav-item" onclick="nav('provvisori')" id="nav-provvisori">
      <span class="nav-icon">💳</span>Provvisori
    </button>
    <button class="nav-item" onclick="nav('cedolini')" id="nav-cedolini">
      <span class="nav-icon">📄</span>Cedolini
    </button>
    <button class="nav-item" onclick="nav('acconti')" id="nav-acconti">
      <span class="nav-icon">💰</span>Acconti
    </button>
  </nav>
</div>

<div class="toast hidden" id="toast"></div>
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-content"></div>
</div>

<script>
// ── CONFIG ──
const API = localStorage.getItem('ceraldi_api') || 'https://gestionale-ceraldi.onrender.com';
let TOKEN = localStorage.getItem('ceraldi_token') || '';
let pinBuffer = '';
let currentPage = 'home';
let dipendenti = [];

// ── PIN AUTH ──
function pinPress(d) {
  if (pinBuffer.length >= 6) return;
  pinBuffer += d;
  updateDots();
  if (pinBuffer.length === 6) doLogin();
}
function pinDel() {
  pinBuffer = pinBuffer.slice(0, -1);
  updateDots();
  document.getElementById('pin-error').textContent = '';
}
function updateDots() {
  for (let i = 0; i < 6; i++) {
    document.getElementById('d' + i).classList.toggle('filled', i < pinBuffer.length);
  }
}
async function doLogin() {
  try {
    const r = await fetch(API + '/api/auth/pin-login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({pin: pinBuffer})
    });
    const d = await r.json();
    if (d.access_token) {
      TOKEN = d.access_token;
      localStorage.setItem('ceraldi_token', TOKEN);
      showApp();
    } else {
      document.getElementById('pin-error').textContent = 'PIN errato';
      pinBuffer = '';
      updateDots();
    }
  } catch(e) {
    document.getElementById('pin-error').textContent = 'Errore connessione';
    pinBuffer = '';
    updateDots();
  }
}

function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  const now = new Date();
  document.getElementById('topbar-date').textContent = now.toLocaleDateString('it-IT', {weekday:'short', day:'numeric', month:'short'});
  nav('home');
  loadDipendenti();
}

// ── API HELPER ──
async function api(method, path, body) {
  const opts = {
    method, headers: {'Content-Type':'application/json', 'Authorization':'Bearer '+TOKEN}
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  if (r.status === 401) { logout(); return null; }
  return r.json();
}

function logout() {
  TOKEN = '';
  localStorage.removeItem('ceraldi_token');
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
  pinBuffer = '';
  updateDots();
}

// ── TOAST ──
function toast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  setTimeout(() => t.classList.add('hidden'), 2800);
}

// ── MODAL ──
function openModal(html) {
  document.getElementById('modal-content').innerHTML = '<div class="modal-handle"></div>' + html;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('open');
}
function closeModalForce() {
  document.getElementById('modal-overlay').classList.remove('open');
}

// ── NAVIGATION ──
function nav(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('nav-' + page);
  if (btn) btn.classList.add('active');
  const titles = {home:'Oggi', corrispettivi:'Corrispettivi', provvisori:'Provvisori', cedolini:'Cedolini', acconti:'Acconti'};
  document.getElementById('page-title').textContent = titles[page] || page;
  const pages = {home: pageHome, corrispettivi: pageCorrispettivi, provvisori: pageProvvisori, cedolini: pageCedolini, acconti: pageAcconti};
  if (pages[page]) pages[page]();
}

// ── HELPER ──
function fmt(n) {
  return new Intl.NumberFormat('it-IT', {style:'currency', currency:'EUR'}).format(n||0);
}
function today() {
  return new Date().toISOString().slice(0,10);
}
function loading() {
  return '<div style="text-align:center;padding:40px"><div class="spinner"></div></div>';
}

// ── PAGE: HOME ──
async function pageHome() {
  document.getElementById('content').innerHTML = loading();
  try {
    const [corr, prov] = await Promise.all([
      api('GET', '/api/corrispettivi?limit=5'),
      api('GET', '/api/dati-provvisori?limit=5')
    ]);

    const totCorr = corr?.corrispettivi?.reduce((s,c) => s + (c.totale||0), 0) || 0;
    const totProv = prov?.dati?.reduce((s,d) => s + (d.importo||0), 0) || 0;

    document.getElementById('content').innerHTML = `
      <div class="section-header">📊 Riepilogo</div>
      <div class="stat-row">
        <div class="stat-box">
          <div class="stat-label">Corrispettivi oggi</div>
          <div class="stat-value green">${fmt(totCorr)}</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Provvisori</div>
          <div class="stat-value gold">${fmt(totProv)}</div>
        </div>
      </div>

      <div class="card" style="margin-top:8px">
        <div class="card-title">Azioni rapide</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <button class="btn btn-secondary" onclick="nav('corrispettivi')" style="height:64px;font-size:13px">🧾<br>Corrispettivo</button>
          <button class="btn btn-secondary" onclick="nav('provvisori')" style="height:64px;font-size:13px">💳<br>Incasso POS</button>
          <button class="btn btn-secondary" onclick="nav('cedolini')" style="height:64px;font-size:13px">📄<br>Cedolini</button>
          <button class="btn btn-secondary" onclick="nav('acconti')" style="height:64px;font-size:13px">💰<br>Acconto</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Ultimi corrispettivi</div>
        ${(corr?.corrispettivi||[]).slice(0,3).map(c => `
          <div class="list-item">
            <div class="list-icon violet">🧾</div>
            <div class="list-body">
              <div class="list-name">${c.data||''}</div>
              <div class="list-sub">${c.tipo||'Manuale'}</div>
            </div>
            <div class="list-amount green">${fmt(c.totale)}</div>
          </div>
        `).join('') || '<div class="empty"><div class="empty-icon">📭</div>Nessun corrispettivo</div>'}
      </div>
    `;
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>Errore caricamento</div>`;
  }
}

// ── PAGE: CORRISPETTIVI ──
function pageCorrispettivi() {
  document.getElementById('content').innerHTML = `
    <div class="section-header">🧾 Corrispettivi</div>

    <div class="card">
      <div class="card-title">Inserimento serale</div>
      <div class="field">
        <label>Data</label>
        <input type="date" id="corr-data" value="${today()}">
      </div>
      <div class="field">
        <label>Totale lordo (€)</label>
        <input type="number" id="corr-totale" placeholder="0.00" step="0.01" inputmode="decimal">
      </div>
      <div class="field">
        <label>IVA %</label>
        <select id="corr-iva">
          <option value="10">10%</option>
          <option value="22">22%</option>
          <option value="4">4%</option>
          <option value="0">Esente</option>
        </select>
      </div>
      <div class="field">
        <label>Note (opzionale)</label>
        <input type="text" id="corr-note" placeholder="es. Pasticceria sera">
      </div>
      <button class="btn btn-primary" id="corr-btn" onclick="salvaCorrispettivo()">
        ✅ Salva corrispettivo
      </button>
    </div>

    <div class="card">
      <div class="card-title">Importa XML ufficiale</div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:14px">
        Carica il file XML dal registratore di cassa. Il sistema sostituirà automaticamente i dati manuali dello stesso giorno.
      </p>
      <input type="file" id="corr-xml-file" accept=".xml,.zip" style="display:none" onchange="uploadXML(this)">
      <button class="btn btn-secondary" onclick="document.getElementById('corr-xml-file').click()">
        📁 Seleziona file XML / ZIP
      </button>
    </div>
  `;
}

async function salvaCorrispettivo() {
  const data = document.getElementById('corr-data').value;
  const totale = parseFloat(document.getElementById('corr-totale').value);
  const iva = parseInt(document.getElementById('corr-iva').value);
  const note = document.getElementById('corr-note').value;

  if (!data || isNaN(totale) || totale <= 0) {
    toast('Inserisci data e importo', 'err'); return;
  }

  const btn = document.getElementById('corr-btn');
  btn.disabled = true; btn.textContent = '⏳ Salvataggio...';

  const imponibile = iva > 0 ? totale / (1 + iva/100) : totale;
  const ivaImporto = totale - imponibile;

  try {
    const r = await api('POST', '/api/corrispettivi/manuale', {
      data, totale, imponibile: Math.round(imponibile*100)/100,
      iva: Math.round(ivaImporto*100)/100, aliquota_iva: iva,
      descrizione: note || 'Inserimento manuale app',
      tipo: 'manuale'
    });
    if (r && !r.detail) {
      toast('✅ Corrispettivo salvato!');
      document.getElementById('corr-totale').value = '';
      document.getElementById('corr-note').value = '';
    } else {
      toast(r?.detail || 'Errore salvataggio', 'err');
    }
  } catch(e) { toast('Errore connessione', 'err'); }
  btn.disabled = false; btn.textContent = '✅ Salva corrispettivo';
}

async function uploadXML(input) {
  const file = input.files[0];
  if (!file) return;
  toast('⏳ Caricamento XML...');
  const form = new FormData();
  form.append('file', file);
  try {
    const r = await fetch(API + '/api/corrispettivi/upload-xml', {
      method: 'POST', headers: {'Authorization':'Bearer '+TOKEN}, body: form
    });
    const d = await r.json();
    if (r.ok) toast('✅ XML importato e dati aggiornati!');
    else toast(d?.detail || 'Errore import XML', 'err');
  } catch(e) { toast('Errore caricamento', 'err'); }
}

// ── PAGE: PROVVISORI (POS) ──
async function pageProvvisori() {
  document.getElementById('content').innerHTML = loading();
  const d = await api('GET', '/api/dati-provvisori');
  const lista = d?.dati || [];

  document.getElementById('content').innerHTML = `
    <div class="section-header">💳 Provvisori <span class="badge">${lista.length}</span></div>

    <div class="card">
      <div class="card-title">Nuovo incasso POS / provvisorio</div>
      <div class="field">
        <label>Data</label>
        <input type="date" id="prov-data" value="${today()}">
      </div>
      <div class="field">
        <label>Importo (€)</label>
        <input type="number" id="prov-importo" placeholder="0.00" step="0.01" inputmode="decimal">
      </div>
      <div class="field">
        <label>Tipo</label>
        <select id="prov-tipo">
          <option value="pos">Incasso POS</option>
          <option value="contante">Contante</option>
          <option value="bonifico">Bonifico</option>
          <option value="altro">Altro</option>
        </select>
      </div>
      <div class="field">
        <label>Descrizione</label>
        <input type="text" id="prov-desc" placeholder="es. POS sera pasticceria">
      </div>
      <button class="btn btn-primary" id="prov-btn" onclick="salvaProvvisorio()">
        💾 Salva provvisorio
      </button>
    </div>

    <div class="card">
      <div class="card-title">In attesa di conferma</div>
      ${lista.length === 0 ? '<div class="empty"><div class="empty-icon">✅</div>Nessun dato provvisorio</div>' :
        lista.slice(0,10).map(p => `
          <div class="list-item">
            <div class="list-icon gold">💳</div>
            <div class="list-body">
              <div class="list-name">${p.descrizione||p.tipo||'Provvisorio'}</div>
              <div class="list-sub">${p.data||''} · <span class="prov-badge">${p.stato||'provvisorio'}</span></div>
            </div>
            <div class="list-amount green">${fmt(p.importo)}</div>
          </div>
        `).join('')
      }
    </div>
  `;
}

async function salvaProvvisorio() {
  const data = document.getElementById('prov-data').value;
  const importo = parseFloat(document.getElementById('prov-importo').value);
  const tipo = document.getElementById('prov-tipo').value;
  const desc = document.getElementById('prov-desc').value;

  if (!data || isNaN(importo) || importo <= 0) {
    toast('Inserisci data e importo', 'err'); return;
  }

  const btn = document.getElementById('prov-btn');
  btn.disabled = true; btn.textContent = '⏳ Salvataggio...';

  try {
    const r = await api('POST', '/api/dati-provvisori/sposta-cassa', {
      data, importo, tipo, descrizione: desc || tipo, stato: 'provvisorio'
    });
    if (r && !r.detail) {
      toast('✅ Provvisorio salvato!');
      document.getElementById('prov-importo').value = '';
      document.getElementById('prov-desc').value = '';
      pageProvvisori();
    } else {
      toast(r?.detail || 'Errore', 'err');
    }
  } catch(e) { toast('Errore connessione', 'err'); }
  btn.disabled = false; btn.textContent = '💾 Salva provvisorio';
}

// ── PAGE: CEDOLINI ──
async function loadDipendenti() {
  try {
    const d = await api('GET', '/api/dipendenti?limit=100&attivo=true');
    dipendenti = d?.dipendenti || d || [];
  } catch(e) { dipendenti = []; }
}

async function pageCedolini() {
  document.getElementById('content').innerHTML = `
    <div class="section-header">📄 Cedolini</div>
    <div class="tab-bar" id="ced-tabs">
      <button class="tab active" onclick="cedTab('lista')">Lista dipendenti</button>
      <button class="tab" onclick="cedTab('mese')">Per mese</button>
    </div>
    <div id="ced-content">${loading()}</div>
  `;
  cedLista();
}

function cedTab(t) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (t === 'lista') cedLista();
  else cedMese();
}

async function cedLista() {
  const c = document.getElementById('ced-content');
  if (!dipendenti.length) await loadDipendenti();
  if (!dipendenti.length) { c.innerHTML = '<div class="empty"><div class="empty-icon">👥</div>Nessun dipendente</div>'; return; }
  c.innerHTML = dipendenti.map(d => `
    <div class="list-item" onclick="vediCedoliniDipendente('${d._id||d.id}','${d.nome} ${d.cognome}')">
      <div class="list-icon violet">👤</div>
      <div class="list-body">
        <div class="list-name">${d.nome} ${d.cognome}</div>
        <div class="list-sub">${d.qualifica||d.mansione||''}</div>
      </div>
      <div style="color:var(--text3);font-size:20px">›</div>
    </div>
  `).join('');
}

async function cedMese() {
  const now = new Date();
  const anno = now.getFullYear();
  const mese = now.getMonth() + 1;
  const c = document.getElementById('ced-content');
  c.innerHTML = loading();
  const d = await api('GET', `/api/cedolini/lista/${anno}/${mese}`);
  const lista = Array.isArray(d) ? d : (d?.cedolini || []);
  c.innerHTML = lista.length === 0 ? '<div class="empty"><div class="empty-icon">📭</div>Nessun cedolino questo mese</div>' :
    lista.map(ced => `
      <div class="list-item" onclick="vediDettaglioCedolino('${ced._id||ced.id}')">
        <div class="list-icon green">📄</div>
        <div class="list-body">
          <div class="list-name">${ced.nome_dipendente||ced.dipendente||''}</div>
          <div class="list-sub">${ced.mese||mese}/${ced.anno||anno} · ${ced.stato||'bozza'}</div>
        </div>
        <div class="list-amount green">${fmt(ced.netto_pagare||ced.netto||0)}</div>
      </div>
    `).join('');
}

async function vediCedoliniDipendente(id, nome) {
  openModal(`
    <div class="modal-title">📄 ${nome}</div>
    <div id="modal-lista-ced">${loading()}</div>
  `);
  const d = await api('GET', `/api/cedolini/dipendente/${id}`);
  const lista = d?.cedolini || (Array.isArray(d) ? d : []);
  document.getElementById('modal-lista-ced').innerHTML = lista.length === 0 ?
    '<div class="empty"><div class="empty-icon">📭</div>Nessun cedolino</div>' :
    lista.slice(0,12).map(ced => `
      <div class="list-item" onclick="vediDettaglioCedolino('${ced._id||ced.id}')">
        <div class="list-icon green">📄</div>
        <div class="list-body">
          <div class="list-name">${ced.mese||''}/${ced.anno||''}</div>
          <div class="list-sub">${ced.stato||'bozza'}</div>
        </div>
        <div class="list-amount green">${fmt(ced.netto_pagare||ced.netto||0)}</div>
      </div>
    `).join('');
}

async function vediDettaglioCedolino(id) {
  const d = await api('GET', `/api/cedolini/${id}`);
  const ced = d?.cedolino || d;
  if (!ced) { toast('Cedolino non trovato', 'err'); return; }
  openModal(`
    <div class="modal-title">📄 Cedolino ${ced.mese||''}/${ced.anno||''}</div>
    <div class="stat-row">
      <div class="stat-box"><div class="stat-label">Lordo</div><div class="stat-value violet">${fmt(ced.stipendio_lordo||ced.lordo||0)}</div></div>
      <div class="stat-box"><div class="stat-label">Netto</div><div class="stat-value green">${fmt(ced.netto_pagare||ced.netto||0)}</div></div>
    </div>
    <div class="stat-row">
      <div class="stat-box"><div class="stat-label">Contributi</div><div class="stat-value">${fmt(ced.contributi_dipendente||0)}</div></div>
      <div class="stat-box"><div class="stat-label">IRPEF</div><div class="stat-value">${fmt(ced.irpef||0)}</div></div>
    </div>
    ${ced.acconto_mese_precedente ? `<div class="card" style="margin-top:8px"><div class="stat-label">Acconto mese prec.</div><div class="stat-value gold" style="font-size:18px">${fmt(ced.acconto_mese_precedente)}</div></div>` : ''}
    <div style="color:var(--text2);font-size:13px;margin-top:12px">Stato: <strong style="color:var(--text)">${ced.stato||'bozza'}</strong></div>
  `);
}

// ── PAGE: ACCONTI ──
async function pageAcconti() {
  document.getElementById('content').innerHTML = `
    <div class="section-header">💰 Acconto stipendio</div>
    <div class="card">
      <div class="card-title">Registra acconto</div>
      <div class="field">
        <label>Dipendente</label>
        <select id="acc-dip">
          <option value="">Seleziona...</option>
          ${dipendenti.map(d => `<option value="${d._id||d.id}">${d.nome} ${d.cognome}</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label>Importo acconto (€)</label>
        <input type="number" id="acc-importo" placeholder="0.00" step="0.01" inputmode="decimal">
      </div>
      <div class="field">
        <label>Data pagamento</label>
        <input type="date" id="acc-data" value="${today()}">
      </div>
      <div class="field">
        <label>Mese di riferimento</label>
        <select id="acc-mese">
          ${['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
             'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre']
            .map((m,i) => `<option value="${i+1}" ${i+1===new Date().getMonth()+1?'selected':''}>${m}</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label>Anno</label>
        <input type="number" id="acc-anno" value="${new Date().getFullYear()}">
      </div>
      <div class="field">
        <label>Metodo pagamento</label>
        <select id="acc-metodo">
          <option value="bonifico">Bonifico</option>
          <option value="contante">Contante</option>
        </select>
      </div>
      <button class="btn btn-primary" id="acc-btn" onclick="salvaAcconto()">
        💰 Registra acconto
      </button>
    </div>

    <div class="card">
      <div class="card-title">Storico acconti</div>
      <div id="acc-storico"><div class="empty"><div class="empty-icon">👆</div>Seleziona un dipendente</div></div>
    </div>
  `;

  document.getElementById('acc-dip').addEventListener('change', async function() {
    const id = this.value;
    if (!id) return;
    const s = document.getElementById('acc-storico');
    s.innerHTML = loading();
    const d = await api('GET', `/api/tfr/acconti/${id}`);
    const lista = d?.acconti || [];
    s.innerHTML = lista.length === 0 ? '<div class="empty"><div class="empty-icon">📭</div>Nessun acconto registrato</div>' :
      lista.slice(0,6).map(a => `
        <div class="list-item">
          <div class="list-icon gold">💰</div>
          <div class="list-body">
            <div class="list-name">${a.mese_riferimento||''}/${a.anno_riferimento||''}</div>
            <div class="list-sub">${a.data_pagamento||''} · ${a.stato||''}</div>
          </div>
          <div class="list-amount green">${fmt(a.importo)}</div>
        </div>
      `).join('');
  });
}

async function salvaAcconto() {
  const dipendente_id = document.getElementById('acc-dip').value;
  const importo = parseFloat(document.getElementById('acc-importo').value);
  const data_pagamento = document.getElementById('acc-data').value;
  const mese = parseInt(document.getElementById('acc-mese').value);
  const anno = parseInt(document.getElementById('acc-anno').value);
  const metodo = document.getElementById('acc-metodo').value;

  if (!dipendente_id) { toast('Seleziona un dipendente', 'err'); return; }
  if (isNaN(importo) || importo <= 0) { toast('Inserisci importo valido', 'err'); return; }

  const btn = document.getElementById('acc-btn');
  btn.disabled = true; btn.textContent = '⏳ Registrazione...';

  try {
    const r = await api('POST', '/api/tfr/acconti', {
      dipendente_id, importo, data_pagamento,
      mese_riferimento: mese, anno_riferimento: anno,
      metodo_pagamento: metodo, stato: 'registrato'
    });
    if (r && !r.detail) {
      toast('✅ Acconto registrato!');
      document.getElementById('acc-importo').value = '';
      document.getElementById('acc-dip').dispatchEvent(new Event('change'));
    } else {
      toast(r?.detail || 'Errore registrazione', 'err');
    }
  } catch(e) { toast('Errore connessione', 'err'); }
  btn.disabled = false; btn.textContent = '💰 Registra acconto';
}

// ── INIT ──
if (TOKEN) {
  // Verifica token ancora valido
  fetch(API + '/api/auth/verify', {headers:{'Authorization':'Bearer '+TOKEN}})
    .then(r => { if (r.ok) showApp(); else logout(); })
    .catch(() => { document.getElementById('pin-error').textContent = ''; });
}
</script>
</body>
</html>
